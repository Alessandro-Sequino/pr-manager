<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PR Manager</title>
  <meta name="description" content="Gestionale professionale per PR: gruppi clienti, acconti ed eventi">
  <meta name="theme-color" content="#08080F">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PR Manager">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2308080F'/%3E%3Ccircle cx='32' cy='26' r='10' fill='none' stroke='%23C9A84C' stroke-width='3'/%3E%3Cpath d='M18 46 Q32 56 46 46' fill='none' stroke='%23C9A84C' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css">

  <style>
    /* ── Design System Variables ────────────────────────────── */
    :root {
      --bg:        #060610;
      --bg1:       #0A0A18;
      --bg2:       #0E0E20;
      --bg3:       #141428;
      --bg4:       #1C1C34;
      --bg5:       #22223E;
      --border:    rgba(255,255,255,0.06);
      --border-hi: rgba(255,255,255,0.12);
      --border-glow: rgba(201,168,76,0.25);
      --glass:     rgba(255,255,255,0.03);
      --glass-hi:  rgba(255,255,255,0.055);
      --gold:      #C9A84C;
      --gold2:     #E2C06A;
      --gold-lo:   rgba(201,168,76,0.07);
      --gold-md:   rgba(201,168,76,0.16);
      --gold-hi:   rgba(201,168,76,0.28);
      --text:      #EDE9E0;
      --text2:     #8E8CA8;
      --text3:     #4E4C66;
      --success:   #4ECDA4;
      --success-bg:rgba(78,205,164,0.09);
      --warn:      #F9A825;
      --warn-bg:   rgba(249,168,37,0.09);
      --danger:    #F06060;
      --danger-bg: rgba(240,96,96,0.09);
      --info:      #4FA3E8;
      --info-bg:   rgba(79,163,232,0.09);
      --violet:    #9B7EF8;
      --violet-bg: rgba(155,126,248,0.09);
      --r-xs: 4px;
      --r-sm: 7px;
      --r-md: 12px;
      --r-lg: 18px;
      --r-xl: 24px;
      --r-2xl:32px;
      --font-h: 'Playfair Display', Georgia, serif;
      --font-b: 'DM Sans', system-ui, sans-serif;
      --font-m: 'DM Mono', monospace;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
      --shadow:    0 4px 24px rgba(0,0,0,.55), 0 1px 3px rgba(0,0,0,.4);
      --shadow-lg: 0 8px 48px rgba(0,0,0,.7), 0 2px 8px rgba(0,0,0,.5);
      --glow-gold: 0 0 20px rgba(201,168,76,0.18);
    }

    /* ── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-b); font-size: 14px; line-height: 1.55; -webkit-font-smoothing: antialiased; }
    input, select, textarea, button { font-family: inherit; font-size: inherit; color: inherit; }

    /* ── Ambient background orbs ───────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 700px 400px at 15% 10%, rgba(155,126,248,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 500px 300px at 85% 80%, rgba(201,168,76,0.055) 0%, transparent 70%),
        radial-gradient(ellipse 400px 350px at 60% 30%, rgba(79,163,232,0.04) 0%, transparent 70%);
    }

    /* ── Layout ─────────────────────────────────────────────── */
    #app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; position: relative; z-index: 1; }

    /* ── Header ─────────────────────────────────────────────── */
    .app-header {
      display: flex; align-items: center; gap: 14px;
      padding: 0 22px; height: 56px; flex-shrink: 0;
      background: rgba(10,10,24,0.85);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .logo-icon {
      width: 32px; height: 32px; border-radius: var(--r-sm);
      background: linear-gradient(135deg, rgba(201,168,76,0.18), rgba(201,168,76,0.06));
      border: 1px solid rgba(201,168,76,0.3);
      display: flex; align-items: center; justify-content: center;
      color: var(--gold); font-size: 15px; flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(201,168,76,0.15);
    }
    .logo-text { font-family: var(--font-h); font-size: 17px; font-weight: 700; letter-spacing: .01em; }
    .logo-text em { color: var(--gold); font-style: normal; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }
    #save-status { font-size: 10px; color: var(--text3); min-width: 60px; text-align: right; letter-spacing: .04em; }

    /* ── Nav ────────────────────────────────────────────────── */
    .app-nav {
      display: flex; gap: 0; padding: 0 16px;
      background: rgba(10,10,24,0.75);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      flex-shrink: 0; overflow-x: auto;
    }
    .app-nav::-webkit-scrollbar { display: none; }
    .tab-btn {
      display: flex; align-items: center; gap: 7px; padding: 0 16px; height: 44px;
      background: none; border: none; cursor: pointer; font-size: 12.5px;
      font-weight: 400; color: var(--text3); border-bottom: 2px solid transparent;
      margin-bottom: -1px; white-space: nowrap;
      transition: color .2s, background .2s;
      border-radius: var(--r-sm) var(--r-sm) 0 0;
      position: relative;
    }
    .tab-btn:hover { color: var(--text2); background: var(--glass); }
    .tab-btn.active {
      color: var(--gold); border-bottom-color: var(--gold); font-weight: 500;
      background: linear-gradient(180deg, rgba(201,168,76,0.06) 0%, transparent 100%);
    }
    .tab-btn i { font-size: 15px; }

    /* ── Content ────────────────────────────────────────────── */
    #content { flex: 1; overflow-y: auto; padding: 22px; scroll-behavior: smooth; }
    #content::-webkit-scrollbar { width: 4px; }
    #content::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

    /* ── Cards ──────────────────────────────────────────────── */
    .card {
      background: var(--glass);
      background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.02) 100%);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 20px 22px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: var(--shadow-sm);
      transition: border-color .2s, box-shadow .2s;
    }
    .card:hover { border-color: var(--border-hi); }
    .card-title { font-family: var(--font-h); font-size: 14.5px; font-weight: 500; margin-bottom: 16px; letter-spacing: .01em; }

    /* ── Metric Tiles ─────────────────────────────────────────── */
    .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 10px; margin-bottom: 18px; }
    .metric-tile {
      background: linear-gradient(135deg, rgba(255,255,255,0.045) 0%, rgba(255,255,255,0.018) 100%);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 16px 18px 14px;
      position: relative; overflow: hidden;
      cursor: pointer;
      transition: border-color .2s, transform .2s, box-shadow .2s;
    }
    .metric-tile::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--m-accent, var(--gold));
      opacity: .55; border-radius: var(--r-md) var(--r-md) 0 0;
    }
    .metric-tile:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--border-hi); }
    .metric-tile:active { transform: translateY(0); }
    .metric-tile .m-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .metric-tile .m-icon-wrap {
      width: 30px; height: 30px; border-radius: var(--r-sm);
      background: var(--m-icon-bg, var(--gold-lo));
      display: flex; align-items: center; justify-content: center;
    }
    .metric-tile .m-icon { color: var(--m-accent, var(--gold)); font-size: 15px; }
    .metric-tile .m-val { font-family: var(--font-m); font-size: 22px; font-weight: 500; line-height: 1; letter-spacing: -.01em; }
    .metric-tile .m-label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); margin-top: 5px; }
    .metric-tile .m-sub { font-size: 10.5px; color: var(--text3); margin-top: 3px; }
    .metric-tile .m-trend {
      font-size: 10px; font-family: var(--font-m);
      background: var(--success-bg); color: var(--success);
      border-radius: 999px; padding: 1px 7px;
    }

    /* ── Buttons ────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 15px; border-radius: var(--r-sm); font-size: 12.5px; font-weight: 500;
      cursor: pointer; border: none;
      transition: transform .15s, opacity .15s, box-shadow .15s;
      white-space: nowrap; position: relative; overflow: hidden;
    }
    .btn:hover { transform: translateY(-1px); opacity: .9; }
    .btn:active { transform: translateY(0); }
    .btn i { font-size: 14px; }
    .btn-primary {
      background: linear-gradient(135deg, #C9A84C, #B8952A);
      color: #08080F;
      box-shadow: 0 2px 10px rgba(201,168,76,0.25);
    }
    .btn-primary:hover { box-shadow: 0 4px 16px rgba(201,168,76,0.35); }
    .btn-secondary { background: var(--bg3); border: 1px solid var(--border-hi); color: var(--text2); }
    .btn-secondary:hover { background: var(--bg4); color: var(--text); }
    .btn-ghost { background: none; border: 1px solid var(--border); color: var(--text2); }
    .btn-ghost:hover { border-color: var(--border-hi); color: var(--text); opacity: 1; transform: none; }
    .btn-danger { background: var(--danger-bg); border: 1px solid rgba(240,96,96,.18); color: var(--danger); }
    .btn-danger:hover { background: rgba(240,96,96,.18); }
    .btn-success-sm { background: var(--success-bg); border: 1px solid rgba(78,205,164,.18); color: var(--success); font-size: 11.5px; padding: 4px 11px; }
    .btn-icon {
      background: none; border: none; cursor: pointer; color: var(--text3);
      display: inline-flex; align-items: center; padding: 6px 7px; border-radius: var(--r-sm);
      transition: color .15s, background .15s, transform .15s;
    }
    .btn-icon:hover { color: var(--text); background: var(--bg4); transform: scale(1.08); }
    .btn-icon:active { transform: scale(.95); }
    .btn-icon.danger:hover { color: var(--danger); background: var(--danger-bg); }
    .btn-icon i { font-size: 15px; }

    /* ── Badges ─────────────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 9px; border-radius: 999px; font-size: 10.5px; font-weight: 600;
      letter-spacing: .02em;
    }
    .badge-green   { background: var(--success-bg); color: var(--success); border: 1px solid rgba(78,205,164,.15); }
    .badge-amber   { background: var(--warn-bg);    color: var(--warn);    border: 1px solid rgba(249,168,37,.15); }
    .badge-red     { background: var(--danger-bg);  color: var(--danger);  border: 1px solid rgba(240,96,96,.15); }
    .badge-blue    { background: var(--info-bg);    color: var(--info);    border: 1px solid rgba(79,163,232,.15); }
    .badge-violet  { background: var(--violet-bg);  color: var(--violet);  border: 1px solid rgba(155,126,248,.15); }
    .badge-neutral { background: var(--bg4);        color: var(--text2);   border: 1px solid var(--border); }

    /* ── Forms ──────────────────────────────────────────────── */
    .field-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); display: block; margin-bottom: 6px; font-weight: 500; }
    .field {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 9px 12px;
      color: var(--text); font-size: 13px; outline: none;
      transition: border-color .18s, box-shadow .18s; resize: vertical;
    }
    .field:focus { border-color: rgba(201,168,76,0.4); box-shadow: 0 0 0 3px rgba(201,168,76,0.07); }
    .field::placeholder { color: var(--text3); }
    select.field option { background: var(--bg2); }
    .field-checkbox { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .field-checkbox input { accent-color: var(--gold); cursor: pointer; width: 15px; height: 15px; }

    /* ── Table ──────────────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; }
    th { padding: 10px 13px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); font-weight: 600; border-bottom: 1px solid var(--border); }
    th:hover { color: var(--text2); cursor: pointer; }
    td { padding: 12px 13px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tbody tr { transition: background .14s; }
    tbody tr:hover td { background: rgba(255,255,255,0.022); }

    /* status stripe on acconto rows */
    .acc-row-confirmed td:first-child { box-shadow: inset 3px 0 0 var(--success); }
    .acc-row-pending   td:first-child { box-shadow: inset 3px 0 0 var(--warn); }
    .acc-row-cancelled td:first-child { box-shadow: inset 3px 0 0 var(--danger); opacity: .65; }

    /* ── Row Items ──────────────────────────────────────────── */
    .row-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 0; border-bottom: 1px solid var(--border);
      transition: background .13s; border-radius: var(--r-sm);
    }
    .row-item:last-child { border-bottom: none; }
    .row-item:hover { background: var(--glass-hi); padding-left: 6px; padding-right: 6px; margin: 0 -6px; }

    /* ── Sidebar items ──────────────────────────────────────── */
    .sidebar-item {
      padding: 10px 12px; border-radius: var(--r-md); cursor: pointer;
      margin-bottom: 4px; border: 1px solid transparent;
      transition: background .15s, border-color .15s, transform .15s;
    }
    .sidebar-item:hover { background: var(--glass-hi); transform: translateX(2px); }
    .sidebar-item.active {
      background: linear-gradient(135deg, rgba(201,168,76,0.1) 0%, rgba(201,168,76,0.04) 100%);
      border-color: var(--gold-md);
    }
    .sidebar-item .si-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }

    /* ── Filter Pills ───────────────────────────────────────── */
    .filter-bar { display: flex; gap: 5px; flex-wrap: wrap; }
    .filter-pill {
      background: none; border: 1px solid var(--border); border-radius: 999px;
      padding: 4px 14px; font-size: 12px; cursor: pointer; color: var(--text2);
      transition: all .15s;
    }
    .filter-pill:hover { border-color: var(--border-hi); color: var(--text); background: var(--glass); }
    .filter-pill.active { background: var(--gold); border-color: var(--gold); color: #08080F; font-weight: 600; box-shadow: 0 2px 10px rgba(201,168,76,0.25); }

    /* ── Avatar ─────────────────────────────────────────────── */
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(201,168,76,0.18), rgba(201,168,76,0.06));
      border: 1px solid rgba(201,168,76,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: var(--gold); flex-shrink: 0;
      letter-spacing: .02em;
    }

    /* ── Search ─────────────────────────────────────────────── */
    .search-wrap { position: relative; }
    .search-wrap .search-ico { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; pointer-events: none; }
    .search-wrap .field { padding-left: 33px; }

    /* ── Bar Chart ──────────────────────────────────────────── */
    .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
    .bar-label { width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; color: var(--text2); flex-shrink: 0; }
    .bar-track { flex: 1; background: var(--bg4); border-radius: 999px; height: 4px; overflow: hidden; }
    .bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold2)); border-radius: 999px; transition: width .7s cubic-bezier(.4,0,.2,1); }
    .bar-value { font-family: var(--font-m); font-size: 11px; color: var(--text3); flex-shrink: 0; width: 65px; text-align: right; }

    /* ── Capacity ───────────────────────────────────────────── */
    .cap-bar { height: 3px; background: var(--bg5); border-radius: 999px; overflow: hidden; margin-top: 5px; }
    .cap-fill { height: 100%; border-radius: 999px; transition: width .5s cubic-bezier(.4,0,.2,1); }

    /* ── Empty State ────────────────────────────────────────── */
    .empty { text-align: center; padding: 44px 20px; color: var(--text3); }
    .empty-icon-wrap {
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
    }
    .empty-icon-wrap i { font-size: 24px; opacity: .35; }
    .empty p { font-size: 13px; line-height: 1.6; }
    .empty .empty-cta { margin-top: 14px; }

    /* ── Divider ────────────────────────────────────────────── */
    .divider { height: 1px; background: var(--border); margin: 16px 0; }

    /* ── Toast ──────────────────────────────────────────────── */
    #toasts { position: fixed; bottom: 22px; right: 22px; display: flex; flex-direction: column; gap: 8px; z-index: 9999; pointer-events: none; }
    .toast {
      background: rgba(14,14,32,0.92); border: 1px solid var(--border-hi);
      border-radius: var(--r-md); padding: 11px 16px; font-size: 13px;
      display: flex; align-items: center; gap: 9px; box-shadow: var(--shadow);
      pointer-events: auto; animation: tin .28s cubic-bezier(.34,1.56,.64,1);
      backdrop-filter: blur(12px);
    }
    .toast.success i { color: var(--success); }
    .toast.error   i { color: var(--danger); }
    .toast.info    i { color: var(--info); }
    .toast.warn    { background: rgba(249,168,37,0.1); border-color: rgba(249,168,37,0.2); color: var(--warn); }
    .toast.warn i  { color: var(--warn); }
    @keyframes tin  { from { opacity:0; transform:translateY(10px) scale(.96); } to { opacity:1; transform:translateY(0) scale(1); } }
    @keyframes tout { to   { opacity:0; transform:translateY(8px) scale(.96); } }

    /* ── Modal ──────────────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.76); z-index: 900;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      animation: fadeIn .2s ease;
    }
    .modal-box {
      background: linear-gradient(135deg, rgba(16,16,30,0.98), rgba(12,12,24,0.98));
      border: 1px solid var(--border-hi); border-radius: var(--r-xl); padding: 30px;
      max-width: 460px; width: 92%;
      box-shadow: var(--shadow-lg), 0 0 50px rgba(201,168,76,0.08);
      animation: slideUp .25s cubic-bezier(.34,1.56,.64,1);
    }
    .modal-title { font-family: var(--font-h); font-size: 21px; font-weight: 600; }
    @keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
    @keyframes slideUp { from { opacity:0; transform:translateY(16px) scale(.97); } to { opacity:1; transform:none; } }

    /* ── Vacation chip ──────────────────────────────────────── */
    .vac-chip {
      display: flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, rgba(155,126,248,0.08), rgba(155,126,248,0.04));
      border: 1px solid rgba(155,126,248,0.16);
      border-radius: var(--r-sm); padding: 8px 12px; margin-bottom: 6px;
    }
    .vac-chip .vac-dates { font-family: var(--font-m); font-size: 12px; color: var(--violet); }
    .vac-chip .vac-note { font-size: 12px; color: var(--text2); }

    /* ── Quick Actions row (dashboard) ─────────────────────── */
    .quick-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .quick-action-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--glass); border: 1px solid var(--border);
      border-radius: var(--r-md); padding: 10px 16px; cursor: pointer;
      transition: all .18s; color: var(--text2); font-size: 13px; font-weight: 500;
    }
    .quick-action-btn:hover { background: var(--glass-hi); border-color: var(--border-hi); color: var(--text); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .quick-action-btn i { font-size: 16px; }
    .quick-action-btn .qa-label { font-size: 12px; }

    /* ── Utilities ──────────────────────────────────────────── */
    .flex            { display: flex; }
    .flex-col        { display: flex; flex-direction: column; }
    .items-center    { align-items: center; }
    .justify-between { justify-content: space-between; }
    .justify-end     { justify-content: flex-end; }
    .gap-2           { gap: 8px; }
    .gap-3           { gap: 12px; }
    .gap-4           { gap: 16px; }
    .mb-2            { margin-bottom: 8px; }
    .mb-3            { margin-bottom: 12px; }
    .mb-4            { margin-bottom: 16px; }
    .mb-5            { margin-bottom: 20px; }
    .mt-3            { margin-top: 12px; }
    .ml-auto         { margin-left: auto; }
    .w-full          { width: 100%; }
    .min-w-0         { min-width: 0; }
    .truncate        { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .text-sm         { font-size: 12px; }
    .text-xs         { font-size: 11px; }
    .text-muted      { color: var(--text2); }
    .text-dim        { color: var(--text3); }
    .text-gold       { color: var(--gold); }
    .text-success    { color: var(--success); }
    .text-danger     { color: var(--danger); }
    .text-violet     { color: var(--violet); }
    .font-medium     { font-weight: 500; }
    .font-bold       { font-weight: 700; }
    .text-mono       { font-family: var(--font-m); }
    .text-head       { font-family: var(--font-h); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 13px; }
    .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 11px; }
    .form-bg { background: rgba(255,255,255,0.025); border: 1px solid var(--border); border-radius: var(--r-md); padding: 16px; margin-bottom: 12px; }

    @media(max-width:640px) {
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
      #content { padding: 14px 12px 80px; }
      .hide-mobile { display: none !important; }
      .amt-row, .amt-row-head { grid-template-columns: 1fr 100px 100px; gap: 6px; }
      /* Mobile bottom nav */
      .app-nav { display: none; }
      .mobile-nav {
        display: flex; position: fixed; bottom: 0; left: 0; right: 0;
        background: rgba(10,10,24,0.96); border-top: 1px solid var(--border);
        backdrop-filter: blur(16px); z-index: 500; padding: 6px 0 env(safe-area-inset-bottom,6px);
      }
      .mobile-nav-btn {
        flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
        background: none; border: none; cursor: pointer; padding: 6px 0;
        color: var(--text3); font-size: 9.5px; font-weight: 500; text-transform: uppercase;
        letter-spacing: .05em; transition: color .15s;
      }
      .mobile-nav-btn i { font-size: 20px; }
      .mobile-nav-btn.active { color: var(--gold); }
    }
    @media(min-width:641px) { .mobile-nav { display: none; } }

    /* ── Weekly Calendar ────────────────────────────────────── */
    .week-nav { display: flex; align-items: center; gap: 10px; }
    .week-nav .week-title { font-family: var(--font-h); font-size: 15px; font-weight: 500; min-width: 220px; text-align: center; }
    .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 12px; align-items: start; }
    .week-col-header { text-align: center; padding: 8px 4px 10px; border-bottom: 2px solid var(--border); }
    .week-col-header .day-name { font-size: 9.5px; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); }
    .week-col-header .day-num { font-family: var(--font-m); font-size: 19px; font-weight: 500; margin-top: 3px; line-height: 1; }
    .week-col-header.today .day-num {
      background: linear-gradient(135deg, var(--gold), var(--gold2)); color: #08080F;
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; margin: 3px auto 0;
      font-size: 14px; box-shadow: 0 2px 10px rgba(201,168,76,0.3);
    }
    .week-col-header.today .day-name { color: var(--gold); }
    .week-col { min-height: 80px; }
    .week-event-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid var(--border); border-radius: var(--r-sm);
      padding: 8px 9px; margin-bottom: 6px; cursor: pointer;
      transition: border-color .15s, background .15s, transform .15s;
      position: relative; overflow: hidden;
    }
    .week-event-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
    .week-event-card.status-available::before { background: var(--warn); }
    .week-event-card.status-paid::before      { background: var(--success); }
    .week-event-card.series::before           { background: var(--violet); }
    .week-event-card:hover { border-color: var(--border-hi); background: rgba(255,255,255,0.055); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .week-event-card .ev-name { font-size: 11.5px; font-weight: 500; line-height: 1.3; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .week-event-card .ev-venue { font-size: 10px; color: var(--text3); margin-top: 3px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .week-event-card .ev-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 5px; }
    .week-event-card .ev-price { font-family: var(--font-m); font-size: 10.5px; color: var(--gold); }
    .week-event-card .ev-occ   { font-size: 10px; color: var(--text3); }
    .week-event-card .ev-cap-bar { height: 2px; background: var(--bg5); border-radius: 999px; margin-top: 4px; overflow: hidden; }
    .week-event-card .ev-cap-fill { height: 100%; border-radius: 999px; }
    .week-empty-day { color: var(--text3); font-size: 11px; text-align: center; padding: 14px 0; opacity: .4; }

    /* ── Month separator ────────────────────────────────────── */
    .month-separator {
      padding: 10px 14px 6px; font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .09em; color: var(--text3);
      background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .month-separator::after { content:''; flex:1; height:1px; background:var(--border); }

    /* ── View toggle ────────────────────────────────────────── */
    .view-toggle { display: flex; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r-sm); overflow: hidden; }
    .view-toggle-btn { background: none; border: none; cursor: pointer; padding: 6px 12px; color: var(--text3); font-size: 12.5px; display: flex; align-items: center; gap: 5px; transition: background .13s, color .13s; }
    .view-toggle-btn:hover { background: var(--bg4); color: var(--text2); }
    .view-toggle-btn.active { background: var(--bg4); color: var(--gold); }
    .view-toggle-btn i { font-size: 14px; }

    /* ── Event row ──────────────────────────────────────────── */
    .evt-row-name { display: flex; align-items: center; gap: 7px; }
    .series-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--violet); flex-shrink: 0; }

    /* ── Event Modal ────────────────────────────────────────── */
    .evt-modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.84);
      z-index: 950; display: flex; align-items: flex-start; justify-content: center;
      padding: 20px 16px; overflow-y: auto; backdrop-filter: blur(8px);
      animation: fadeIn .18s ease;
    }
    .evt-modal {
      background: linear-gradient(160deg, rgba(14,14,28,0.99), rgba(10,10,20,0.99));
      border: 1px solid var(--border-hi); border-radius: var(--r-xl);
      width: 100%; max-width: 780px;
      box-shadow: var(--shadow-lg), 0 0 80px rgba(201,168,76,0.06);
      flex-shrink: 0; animation: slideUp .25s cubic-bezier(.34,1.56,.64,1);
    }
    .evt-modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 26px 18px; border-bottom: 1px solid var(--border);
    }
    .evt-modal-body { padding: 22px 26px; }
    .evt-modal-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 26px; border-top: 1px solid var(--border);
      background: rgba(255,255,255,0.02); border-radius: 0 0 var(--r-xl) var(--r-xl);
    }
    .section-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--gold); margin-bottom: 14px;
      display: flex; align-items: center; gap: 7px;
    }
    .section-title::after { content:''; flex:1; height:1px; background:var(--gold-md); }
    .section-block { margin-bottom: 24px; }
    .color-swatch { width: 28px; height: 28px; border-radius: 6px; border: 2px solid transparent; cursor: pointer; flex-shrink: 0; transition: transform .12s, border-color .12s; }
    .color-swatch:hover { transform: scale(1.12); }
    .color-swatch.active { border-color: var(--text); transform: scale(1.15); box-shadow: 0 2px 8px rgba(0,0,0,.4); }
    .status-chip {
      display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px;
      border-radius: var(--r-sm); border: 1px solid var(--border); cursor: pointer;
      font-size: 12px; font-weight: 500; transition: all .14s;
    }
    .status-chip:hover { border-color: var(--border-hi); background: var(--glass); }
    .status-chip.active-chip { border-width: 2px; }
    .status-chip .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink:0; }
    tr.evt-selected td { background: rgba(201,168,76,0.05) !important; }
    tr.evt-selected td:first-child { box-shadow: inset 3px 0 0 var(--gold); }

    @media(max-width:640px) {
      .evt-modal-overlay { padding: 0; align-items: flex-end; }
      .evt-modal { border-radius: var(--r-xl) var(--r-xl) 0 0; max-height: 92vh; overflow-y: auto; }
    }

    /* ── Multi-event acconto form ───────────────────────────── */
    .evt-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 999px; font-size: 12px; font-weight: 500;
      cursor: pointer; border: 1px solid var(--border); background: none;
      color: var(--text2); transition: all .14s; white-space: nowrap;
    }
    .evt-chip:hover { border-color: var(--border-hi); color: var(--text); background: var(--glass); }
    .evt-chip.selected { background: var(--gold-md); border-color: var(--gold); color: var(--gold); }
    .evt-chip .chip-date { font-size: 10px; opacity: .7; }
    .amt-row { display: grid; grid-template-columns: 1fr 140px 140px; gap: 10px; padding: 11px 14px; border-bottom: 1px solid var(--border); align-items: center; }
    .amt-row:last-child { border-bottom: none; }
    .amt-row-head { display: grid; grid-template-columns: 1fr 140px 140px; gap: 10px; padding: 7px 14px; background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); }
    .step-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .09em; color: var(--gold); margin-bottom: 9px; display: flex; align-items: center; gap: 6px; }
    .step-label::after { content:''; flex:1; height:1px; background:var(--gold-md); }

    /* ── Author Credit ──────────────────────────────────────── */
    #author-credit {
      position: fixed; bottom: 10px; right: 16px; font-size: 9.5px; font-weight: 600;
      color: var(--text3); letter-spacing: .07em; text-transform: uppercase;
      pointer-events: none; z-index: 800; opacity: .4; font-family: var(--font-m); user-select: none;
    }
    @media(max-width:640px){ #author-credit { display:none; } }

    /* ── Pacchetti ────────────────────────────────────────────── */
    .pkg-item { padding:10px 12px; border-radius:var(--r-md); cursor:pointer; margin-bottom:4px; border:1px solid transparent; transition:background .15s,border-color .15s; }
    .pkg-item:hover { background:var(--glass-hi); }
    .pkg-item.pkg-sel { background:linear-gradient(135deg,rgba(201,168,76,.09) 0%,rgba(201,168,76,.03) 100%); border-color:var(--gold-md); }
    .pkg-block { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r-md); padding:13px 15px; margin-bottom:10px; }
    .pkg-block-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.09em; color:var(--gold); margin-bottom:9px; display:flex; align-items:center; gap:6px; }
    .pren-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); }
    .pren-row:last-child { border-bottom:none; }
    .stat-chip { background:var(--bg2); border:1px solid var(--border); border-radius:var(--r-md); padding:10px 14px; text-align:center; }
    .stat-chip .sc-val { font-family:var(--font-m); font-size:20px; font-weight:500; line-height:1.2; }
    .stat-chip .sc-lbl { font-size:10px; text-transform:uppercase; letter-spacing:.07em; color:var(--text3); margin-top:3px; }
    /* ── Liste Ospiti ─────────────────────────────────────────── */
    .ospite-row { display:grid; grid-template-columns:1fr 90px 90px auto; align-items:center; gap:10px; padding:9px 12px; border-bottom:1px solid var(--border); transition:background .12s; }
    .ospite-row:last-child { border-bottom:none; }
    .ospite-row:hover { background:var(--glass-hi); }
    .ospite-row.st-entrato  { border-left:3px solid var(--success); padding-left:9px; }
    .ospite-row.st-no-show  { border-left:3px solid var(--danger);  padding-left:9px; opacity:.65; }
    .ospite-row.st-attesa   { border-left:3px solid var(--warn);    padding-left:9px; }
    .checkin-btn { background:var(--success-bg); border:1px solid rgba(78,205,164,.18); color:var(--success); border-radius:var(--r-sm); padding:4px 10px; font-size:11.5px; font-weight:500; cursor:pointer; display:inline-flex; align-items:center; gap:4px; transition:background .14s; white-space:nowrap; }
    .checkin-btn:hover { background:rgba(78,205,164,.18); }
    .evt-pill { display:block; width:100%; padding:9px 12px; border-radius:var(--r-md); cursor:pointer; border:1px solid var(--border); background:none; font-size:13px; color:var(--text2); transition:all .14s; text-align:left; margin-bottom:5px; }
    .evt-pill:hover { border-color:var(--border-hi); color:var(--text); background:var(--glass); }
    .evt-pill.ev-active { border-color:var(--gold); background:var(--gold-lo); color:var(--gold); }
    .fill-bar { height:5px; border-radius:999px; overflow:hidden; background:var(--bg4); margin-bottom:14px; }
    .fill-bar-inner { height:100%; border-radius:999px; transition:width .5s; }

    /* ── Settings ─────────────────────────────────────────────── */
    .settings-layout { display:grid; grid-template-columns:220px 1fr; gap:16px; align-items:start; }
    .settings-nav { background:var(--glass); border:1px solid var(--border); border-radius:var(--r-lg); padding:10px; position:sticky; top:0; }
    .settings-nav-item {
      display:flex; align-items:center; gap:9px; padding:9px 12px;
      border-radius:var(--r-sm); cursor:pointer; font-size:13px; font-weight:400;
      color:var(--text2); border:1px solid transparent; transition:all .14s; margin-bottom:2px;
    }
    .settings-nav-item:hover { color:var(--text); background:var(--glass-hi); }
    .settings-nav-item.active { color:var(--gold); background:var(--gold-lo); border-color:var(--gold-md); font-weight:500; }
    .settings-nav-item i { font-size:15px; flex-shrink:0; }
    .settings-section { background:var(--glass); border:1px solid var(--border); border-radius:var(--r-lg); padding:24px; }
    .settings-title { font-family:var(--font-h); font-size:18px; font-weight:600; margin-bottom:4px; }
    .settings-subtitle { font-size:12px; color:var(--text3); margin-bottom:22px; }
    .settings-group { margin-bottom:28px; }
    .settings-group:last-child { margin-bottom:0; }
    .settings-group-title {
      font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.09em;
      color:var(--gold); margin-bottom:12px; display:flex; align-items:center; gap:7px;
    }
    .settings-group-title::after { content:''; flex:1; height:1px; background:var(--gold-md); }
    .setting-row {
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 14px; border-radius:var(--r-md); border:1px solid var(--border);
      margin-bottom:6px; background:var(--bg2); transition:border-color .14s;
      cursor:pointer;
    }
    .setting-row:hover { border-color:var(--border-hi); }
    .setting-row-info { min-width:0; }
    .setting-row-label { font-size:13px; font-weight:500; }
    .setting-row-desc  { font-size:11px; color:var(--text3); margin-top:1px; }
    /* Toggle switch */
    .toggle-wrap { flex-shrink:0; margin-left:16px; }
    .toggle { position:relative; width:38px; height:21px; display:block; }
    .toggle input { opacity:0; width:0; height:0; }
    .toggle-track {
      position:absolute; inset:0; border-radius:999px;
      background:var(--bg4); border:1px solid var(--border-hi);
      transition:background .2s, border-color .2s; cursor:pointer;
    }
    .toggle-thumb {
      position:absolute; top:3px; left:3px;
      width:13px; height:13px; border-radius:50%;
      background:var(--text3); transition:transform .2s, background .2s;
    }
    .toggle input:checked + .toggle-track { background:var(--gold); border-color:var(--gold); }
    .toggle input:checked + .toggle-track .toggle-thumb { transform:translateX(17px); background:#08080F; }
    .settings-reset-bar { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; background:var(--danger-bg); border:1px solid rgba(240,96,96,.2); border-radius:var(--r-md); margin-top:24px; }

    @media(max-width:640px) {
      .settings-layout { grid-template-columns:1fr; }
      .settings-nav { position:static; display:flex; overflow-x:auto; gap:4px; }
      .settings-nav-item { white-space:nowrap; }
      .settings-nav-item i { display:none; }
    }
  </style>
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="logo-icon"><i class="ti ti-crown"></i></div>
    <span class="logo-text">PR <em>Manager</em></span>
    <div class="header-right">
      <span id="save-status"></span>
      <button class="btn btn-ghost" style="font-size:12px;padding:5px 12px;color:var(--danger);border-color:rgba(248,113,113,0.3)" onclick="resetData()" title="Cancella tutti i dati">
        <i class="ti ti-trash" style="font-size:14px"></i><span class="hide-mobile">Svuota</span>
      </button>
      <button class="btn btn-ghost" style="font-size:12px;padding:5px 12px" onclick="importData()" title="Importa backup JSON">
        <i class="ti ti-upload" style="font-size:14px"></i><span class="hide-mobile">Importa</span>
      </button>
      <button class="btn btn-ghost" style="font-size:12px;padding:5px 12px" onclick="exportData()" title="Esporta backup JSON">
        <i class="ti ti-download" style="font-size:14px"></i><span class="hide-mobile">Backup</span>
      </button>
      <button class="btn btn-ghost" style="font-size:12px;padding:5px 12px" onclick="showInstallModal()">
        <i class="ti ti-device-desktop" style="font-size:14px"></i><span class="hide-mobile">Installa</span>
      </button>
    </div>
  </header>

  <nav class="app-nav" id="nav">
    <button class="tab-btn active" data-tab="dashboard" onclick="switchTab('dashboard')"><i class="ti ti-layout-dashboard"></i>Dashboard</button>
    <button class="tab-btn" data-tab="gruppi"    onclick="switchTab('gruppi')">  <i class="ti ti-users"></i>Gruppi</button>
    <button class="tab-btn" data-tab="acconti"   onclick="switchTab('acconti')"> <i class="ti ti-receipt"></i>Acconti</button>
    <button class="tab-btn" data-tab="eventi"    onclick="switchTab('eventi')">  <i class="ti ti-calendar-event"></i>Eventi</button>
    <button class="tab-btn" data-tab="stats"     onclick="switchTab('stats')">   <i class="ti ti-chart-bar"></i>Statistiche</button>
    <button class="tab-btn" data-tab="pacchetti" onclick="switchTab('pacchetti')"><i class="ti ti-package"></i>Pacchetti</button>
    <button class="tab-btn" data-tab="liste"     onclick="switchTab('liste')">   <i class="ti ti-list-check"></i>Liste</button>
    <button class="tab-btn" data-tab="settings"  onclick="switchTab('settings')" style="margin-left:auto"><i class="ti ti-settings"></i>Impostazioni</button>
  </nav>

  <main id="content"></main>
</div>

<!-- hidden file input for import -->
<input type="file" id="import-file-input" accept=".json" style="display:none" onchange="handleImportFile(event)">

<div id="toasts"></div>
<div id="modal-root"></div>
<div id="author-credit">Alessandro Sequino</div>

<script>
/* ── Helpers ──────────────────────────────────────────────── */
const uid  = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);
const eur  = n  => new Intl.NumberFormat('it-IT',{style:'currency',currency:'EUR'}).format(+n||0);
const dat  = d  => d ? new Date(d+'T12:00').toLocaleDateString('it-IT',{day:'2-digit',month:'short',year:'numeric'}) : '—';
const pct  = (a,b) => b > 0 ? Math.min(100, Math.round(a/b*100)) : 0;
const ini  = s  => (s||'?').trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2);
const esc  = s  => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const val  = id => document.getElementById(id)?.value ?? '';

/* ── Storage (localStorage + artifact fallback) ───────────── */
const Store = {
  async get(k) {
    try {
      if(window.storage) return window.storage.get(k);
      const v = localStorage.getItem(k);
      return v ? {value:v} : null;
    } catch(e){ return null; }
  },
  async set(k,v) {
    try {
      if(window.storage) return window.storage.set(k,v);
      localStorage.setItem(k,v); return true;
    } catch(e){ return null; }
  }
};

/* ── Settings Config ──────────────────────────────────────── */
const CFG_DEFAULTS = {
  // ── Sezioni tab visibili nella navbar
  tabs: {
    dashboard: true, gruppi: true, acconti: true, eventi: true,
    stats: true, pacchetti: true, liste: true,
  },
  // ── Dashboard widget
  dash: {
    metricGruppi: true, metricEventi: true, metricIncasso: true,
    metricConfermato: true, metricCrediti: true,
    cardAcconti: true, cardEventi: true, cardPacchetti: true,
  },
  // ── Gruppi: sezioni nel pannello dettaglio
  gruppi: {

function toast(msg, type='success') {

  const el = document.createElement('div');
  el.className = `toast ${type}`;

/* ── Undo System ──────────────────────────────────────────── */
let undoTimeout = null;
let undoAction = null;
function deleteWithUndo(msg, stateBackupFn, saveFn) {
  const backup = stateBackupFn();
  undoAction = () => {
    saveFn(backup);
    clearTimeout(undoTimeout);
    document.getElementById('undo-toast')?.remove();
    toast('Azione annullata', 'info');
    render();
  };
  
  const el = document.createElement('div');
  el.id = 'undo-toast';
  el.className = `toast warn`;
  el.innerHTML = `<i class="ti ti-trash"></i><span>${esc(msg)}</span><button class="btn btn-ghost" style="padding:4px 8px;font-size:11px;margin-left:10px" onclick="if(undoAction)undoAction()">Annulla</button>`;
  document.getElementById('toasts').appendChild(el);
  
  undoTimeout = setTimeout(() => {
    el.style.animation='tout .3s forwards';
    setTimeout(()=>el.remove(),300);
    undoAction = null;
  }, 5000);
}

/* ── Persist ──────────────────────────────────────────────── */
async function loadData() {
  try {
    const g = await Store.get('prm_gruppi');
    const e = await Store.get('prm_eventi');
    const a = await Store.get('prm_acconti');
    if(g) S.gruppi  = JSON.parse(g.value);
    if(e) S.eventi  = JSON.parse(e.value);
    if(a) S.acconti = JSON.parse(a.value);
    const pk = await Store.get('prm_pacchetti');
    const pp = await Store.get('prm_prenp');
    if(pk) S.pacchetti       = JSON.parse(pk.value);
    if(pp) S.prenotazioniPkg = JSON.parse(pp.value);
    // Load settings
    const cfg = await Store.get('prm_cfg');
    if(cfg) {
      const saved = JSON.parse(cfg.value);
      // Deep merge: keep defaults for any new keys added in future versions
      for(const section in CFG_DEFAULTS) {
        if(!CFG[section]) CFG[section] = {};
        for(const key in CFG_DEFAULTS[section]) {
          if(saved[section] && saved[section][key] !== undefined)
            CFG[section][key] = saved[section][key];
        }
      }
    }
  } catch(e) {}
  updateNav();
  render();
}
async function persist(key, val) {
  await Store.set(key, JSON.stringify(val));
  const el = document.getElementById('save-status');
  if(el){ el.textContent='✓ Salvato'; setTimeout(()=>el.textContent='',2200); }
}

/* ── Export / Import JSON backup ─────────────────────────── */
function exportData() {
  const payload = {
    version: 13,
    exportedAt: new Date().toISOString(),
    gruppi:  S.gruppi,
    eventi:  S.eventi,
    acconti: S.acconti,
    pacchetti: S.pacchetti,
    prenotazioniPkg: S.prenotazioniPkg,
  };
  const json = JSON.stringify(payload, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `PR_Manager_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Backup JSON esportato','info');
}

function importData() {
  document.getElementById('import-file-input').click();
}

function handleImportFile(ev) {
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const payload = JSON.parse(e.target.result);
      if(!payload.gruppi || !payload.eventi || !payload.acconti) {
        toast('File non valido: struttura non riconosciuta','error'); return;
      }
      if(!confirm(`Importare ${payload.gruppi.length} gruppi, ${payload.eventi.length} eventi e ${payload.acconti.length} acconti? I dati attuali verranno sovrascritti.`)) return;
      S.gruppi  = payload.gruppi;
      S.eventi  = payload.eventi;
      S.acconti = payload.acconti;
      if(payload.pacchetti)       S.pacchetti       = payload.pacchetti;
      if(payload.prenotazioniPkg) S.prenotazioniPkg = payload.prenotazioniPkg;
      await persist('prm_gruppi', S.gruppi);
      await persist('prm_eventi', S.eventi);
      await persist('prm_acconti', S.acconti);
      if(S.pacchetti.length)       await persist('prm_pacchetti', S.pacchetti);
      if(S.prenotazioniPkg.length) await persist('prm_prenp', S.prenotazioniPkg);
      toast(`Backup ripristinato: ${S.gruppi.length} gruppi, ${S.eventi.length} eventi, ${S.acconti.length} acconti`,'info');
      render();
    } catch(err) {
      toast('Errore nella lettura del file JSON','error');
    }
  };
  reader.readAsText(file);
  // reset so same file can be re-imported
  ev.target.value = '';
}

  const recentHTML = recent.length===0 ? empty('ti-receipt','Nessun acconto inserito') :

function shareWA(gId) {
  const g = S.gruppi.find(x=>x.id===gId);
  if(!g) return;
  const gAcconti = S.acconti.filter(a=>a.groupId===g.id);
  const conf = gAcconti.filter(a=>a.status==='confirmed').reduce((s,a)=>s+(+a.amount||0),0);
  const due = gAcconti.reduce((s,a)=>s+(+a.totalDue||0),0);
  const saldo = due - conf;
  
  let text = `Ciao! Ecco il riepilogo per il gruppo *${g.name}*:\n\n`;
  const evtIds = [...new Set(gAcconti.map(a=>a.eventId).filter(Boolean))];
  evtIds.forEach(id => {
    const ev = S.eventi.find(x=>x.id===id);
    if(ev) {
      const acc = gAcconti.filter(a=>a.eventId===id);
      const eDue = acc.reduce((s,a)=>s+(+a.totalDue||0),0);
      const eConf = acc.filter(a=>a.status==='confirmed').reduce((s,a)=>s+(+a.amount||0),0);
      text += `📅 *${ev.name}* (${dat(ev.date)})\n`;
      text += `   Totale: ${eur(eDue)} | Acconto: ${eur(eConf)} | Saldo: ${eur(eDue-eConf)}\n`;
    }
  });
  text += `\n💰 *Totale da Saldare:* ${eur(saldo > 0 ? saldo : 0)}\n`;
  window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}

function renderAcconti() {
  const labels = {all:'Tutti',pending:'In attesa',confirmed:'Confermati',cancelled:'Annullati'};
  let filtered = S.acconti.filter(a=>S.accFilter==='all'||a.status===S.accFilter);

  // ── search by group name, event name, note ──
  if (S.accSearch) {
    const q = S.accSearch.toLowerCase();
    filtered = filtered.filter(a => {
      const gName = (S.gruppi.find(g=>g.id===a.groupId)?.name||'').toLowerCase();
      const eName = (S.eventi.find(e=>e.id===a.eventId)?.name||'').toLowerCase();
      const note  = (a.note||'').toLowerCase();
      return gName.includes(q) || eName.includes(q) || note.includes(q);
    });
  }
  
  if (S.sort.key) {
    filtered.sort((a,b) => {
      let v1 = a[S.sort.key];
      let v2 = b[S.sort.key];
      if(['amount','totalDue','ts'].includes(S.sort.key)) { v1=+v1||0; v2=+v2||0; }
      if (v1 < v2) return -1 * S.sort.dir;
      if (v1 > v2) return 1 * S.sort.dir;
      return 0;

    filtered.sort((a,b)=>(b.ts||0)-(a.ts||0));

  const totFil = filtered.reduce((s,a)=>s+(+a.amount||0),0);

/* helpers for week calendar */
function getWeekDays(offset) {
  const today = new Date(); today.setHours(0,0,0,0);
  const dow = today.getDay();
  const mondayDelta = dow === 0 ? -6 : 1 - dow;
  const monday = new Date(today);
  monday.setDate(today.getDate() + mondayDelta + offset * 7);
  return Array.from({length:7}, (_,i) => { const d=new Date(monday); d.setDate(monday.getDate()+i); return d; });
}
function isoDate(d) { return d.toISOString().split('T')[0]; }
function isToday(d) {
  const t = new Date(); t.setHours(0,0,0,0);
  return d.getTime() === t.getTime();
}

function evtPickStatus(v) {
  document.getElementById('ef-status').value = v;
  const map = {available:'#FBB040', paid:'#5DE0A5', cancelled:'#F87171', soldout:'#A78BFA', private:'#60A5FA'};
  document.querySelectorAll('.status-chip').forEach(el => {
    const sv = el.id.replace('schip-','');
    const isActive = sv === v;
    el.classList.toggle('active-chip', isActive);
    el.style.borderWidth = isActive ? '2px' : '1px';
    el.style.borderColor = isActive ? (map[sv]||'var(--border)') : 'var(--border)';
    el.style.background  = isActive ? (map[sv]+'22'||'') : '';
    el.style.color       = isActive ? '' : 'var(--text2)';
  });
}

function renderEventi() {
  const cntAvail    = S.eventi.filter(e=>e.status==='available').length;
  const cntPaid     = S.eventi.filter(e=>e.status==='paid').length;
  const cntAll      = S.eventi.length;
  const cntCancelled= S.eventi.filter(e=>e.status==='cancelled').length;
  const cntSoldout  = S.eventi.filter(e=>e.status==='soldout').length;
  const cntPrivate  = S.eventi.filter(e=>e.status==='private').length;

  // --- filtered pool ---
  let pool = [...S.eventi];
  // status filter (skip for 'all' in week view)
  if (S.evtSub !== 'all') pool = pool.filter(e => e.status === S.evtSub);
  // search
  if (S.evtSearch) {
    const q = S.evtSearch.toLowerCase();
    pool = pool.filter(e => e.name.toLowerCase().includes(q) || (e.venue||'').toLowerCase().includes(q) || (e.tag||'').toLowerCase().includes(q));
  }
  // period filter (only in table view)
  if (S.evtView === 'table' && S.evtPeriod !== 'all') {
    const now = new Date(); now.setHours(0,0,0,0);
    const todayStr = isoDate(now);
    if (S.evtPeriod === 'week') {
      const days = getWeekDays(0);
      const from = isoDate(days[0]); const to = isoDate(days[6]);
      pool = pool.filter(e => e.date >= from && e.date <= to);
    } else if (S.evtPeriod === 'month') {
      const y = now.getFullYear(); const m = String(now.getMonth()+1).padStart(2,'0');
      pool = pool.filter(e => e.date && e.date.startsWith(`${y}-${m}`));
    } else if (S.evtPeriod === 'next30') {
      const end = new Date(now); end.setDate(end.getDate()+30);
      pool = pool.filter(e => e.date >= todayStr && e.date <= isoDate(end));
    }
  }

  // sort
  if (S.sort.key) {
    pool.sort((a,b) => {
      let v1=a[S.sort.key], v2=b[S.sort.key];
      if(['price','capacity','ts'].includes(S.sort.key)){v1=+v1||0;v2=+v2||0;}
      return (v1<v2?-1:v1>v2?1:0)*S.sort.dir;
    });
  } else {
    pool.sort((a,b) => new Date(a.date)-new Date(b.date));
  }

  /* ── top bar ── */
  const topBar = `
    <div class="flex items-center justify-between mb-3" style="flex-wrap:wrap;gap:10px">
      <!-- left: status pills + period pills -->
      <div style="display:flex;flex-direction:column;gap:8px">
        <div class="filter-bar">
          <button class="filter-pill${S.evtSub==='available'?' active':''}" onclick="setEvtSub('available')">
            <i class="ti ti-circle" style="font-size:9px;margin-right:3px;color:var(--warn)"></i>Disponibili (${cntAvail})
          </button>
          <button class="filter-pill${S.evtSub==='paid'?' active':''}" onclick="setEvtSub('paid')">
            <i class="ti ti-circle-check" style="font-size:10px;margin-right:3px;color:var(--success)"></i>Pagati (${cntPaid})
          </button>
          ${cntSoldout>0?`<button class="filter-pill${S.evtSub==='soldout'?' active':''}" onclick="setEvtSub('soldout')"><i class="ti ti-circle" style="font-size:9px;margin-right:3px;color:var(--violet)"></i>Sold Out (${cntSoldout})</button>`:''}
          ${cntPrivate>0?`<button class="filter-pill${S.evtSub==='private'?' active':''}" onclick="setEvtSub('private')"><i class="ti ti-lock" style="font-size:10px;margin-right:3px;color:var(--info)"></i>Privati (${cntPrivate})</button>`:''}
          ${cntCancelled>0?`<button class="filter-pill${S.evtSub==='cancelled'?' active':''}" onclick="setEvtSub('cancelled')"><i class="ti ti-ban" style="font-size:10px;margin-right:3px;color:var(--danger)"></i>Cancellati (${cntCancelled})</button>`:''}
          <button class="filter-pill${S.evtSub==='all'?' active':''}" onclick="setEvtSub('all')">Tutti (${cntAll})</button>
        </div>
        ${S.evtView==='table' ? `<div class="filter-bar">
          ${[['all','Tutte le date'],['week','Questa settimana'],['month','Questo mese'],['next30','Prossimi 30gg']].map(([v,l])=>
            `<button class="filter-pill${S.evtPeriod===v?' active':''}" style="font-size:11px;padding:3px 10px" onclick="setEvtPeriod('${v}')">${l}</button>`).join('')}
        </div>` : ''}
      </div>
      <!-- right: search + view toggle + new -->
      <div class="flex gap-2 items-center" style="flex-wrap:wrap">
        <div class="search-wrap" style="width:190px">
          <i class="ti ti-search search-ico"></i>
          <input class="field w-full" placeholder="Cerca…" value="${esc(S.evtSearch)}" oninput="S.evtSearch=this.value;render()">
        </div>
        <div class="view-toggle">
          <button class="view-toggle-btn${S.evtView==='table'?' active':''}" onclick="setEvtView('table')" title="Vista tabella">
            <i class="ti ti-list"></i><span class="hide-mobile">Lista</span>
          </button>
          <button class="view-toggle-btn${S.evtView==='week'?' active':''}" onclick="setEvtView('week')" title="Vista settimanale">
            <i class="ti ti-calendar-week"></i><span class="hide-mobile">Settimana</span>
          </button>
        </div>
        ${btn('Nuovo evento','openEvtModal(null)','btn-primary','ti-plus')}
      </div>
    </div>`;

  /* ── week calendar view ── */
  if (S.evtView === 'week') {
    const weekDays = getWeekDays(S.evtWeekOffset);
    const dayNames = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
    const fromStr = isoDate(weekDays[0]); const toStr = isoDate(weekDays[6]);
    const fmt = d => d.toLocaleDateString('it-IT',{day:'2-digit',month:'short'});
    const weekTitle = `${fmt(weekDays[0])} – ${fmt(weekDays[6])} ${weekDays[0].getFullYear()}`;

    const weekNav = `<div class="card mb-3">
      <div class="flex items-center justify-between">
        <div class="week-nav">
          ${btn('','setEvtWeekOffset(-1)','btn-ghost','ti-chevron-left')}
          <span class="week-title">${weekTitle}</span>
          ${btn('','setEvtWeekOffset(1)','btn-ghost','ti-chevron-right')}
        </div>
        <div class="flex gap-2">
          ${S.evtWeekOffset!==0 ? `<button class="btn btn-ghost" style="font-size:12px" onclick="S.evtWeekOffset=0;render()"><i class="ti ti-calendar-today"></i> Oggi</button>` : ''}
          <span class="text-dim text-sm" style="align-self:center">${pool.filter(e=>e.date>=fromStr&&e.date<=toStr).length} eventi</span>
        </div>
      </div>
      <div class="week-grid" style="margin-top:12px">
        ${weekDays.map((d,i) => {
          const ds = isoDate(d);
          const dayEvts = S.eventi.filter(e => {
            if(S.evtSub!=='all' && e.status!==S.evtSub) return false;
            if(S.evtSearch){const q=S.evtSearch.toLowerCase();if(!e.name.toLowerCase().includes(q)&&!(e.venue||'').toLowerCase().includes(q))return false;}
            return e.date===ds;
          }).sort((a,b)=>a.name.localeCompare(b.name));
          const isWknd = i>=5;
          return `<div>
            <div class="week-col-header${isToday(d)?' today':''}${isWknd?' text-dim':''}">
              <div class="day-name">${dayNames[i]}</div>
              <div class="day-num">${d.getDate()}</div>
            </div>
            <div class="week-col" style="padding-top:8px">
              ${dayEvts.length===0
                ? `<div class="week-empty-day">·</div>`
                : dayEvts.map(e => {
                    const evtAcc = S.acconti.filter(a=>a.eventId===e.id);
                    const cap = parseInt(e.capacity)||0;
                    const occ = evtAcc.length;
                    const capPct = cap>0?pct(occ,cap):0;
                    const capColor = capPct>=90?'var(--danger)':capPct>=70?'var(--warn)':'var(--success)';
                    const isAvail = e.status==='available';
                    return `<div class="week-event-card ${e.seriesId?'series':'status-'+e.status}" onclick="openEvtModal('${e.id}')" title="${esc(e.name)}${e.venue?' · '+esc(e.venue):''}">
                      <div class="ev-name">${esc(e.name)}</div>
                      ${e.venue?`<div class="ev-venue"><i class="ti ti-map-pin" style="font-size:9px"></i> ${esc(e.venue)}</div>`:''}
                      <div class="ev-meta">
                        <span class="ev-price">${e.price>0?eur(e.price):''}</span>
                        <span class="ev-occ">${occ>0?`${occ}${cap>0?' / '+cap:' preno'}`:(cap>0?`0/${cap}`:'')}</span>
                      </div>
                      ${cap>0?`<div class="ev-cap-bar"><div class="ev-cap-fill" style="width:${capPct}%;background:${capColor}"></div></div>`:''}
                      <div style="display:flex;gap:4px;margin-top:5px;flex-wrap:wrap">
                        ${isAvail
                          ? `<button class="btn btn-success-sm" style="font-size:10px;padding:2px 7px" onclick="event.stopPropagation();markPaid('${e.id}')"><i class="ti ti-circle-check"></i></button>`
                          : `<button class="btn btn-ghost" style="font-size:10px;padding:2px 7px" onclick="event.stopPropagation();markAvail('${e.id}')"><i class="ti ti-rotate-clockwise"></i></button>`}
                        <button class="btn-icon" onclick="event.stopPropagation();openEvtModal('${e.id}')" title="Modifica"><i class="ti ti-edit" style="font-size:13px"></i></button>
                        <button class="btn-icon danger" onclick="event.stopPropagation();delEvento('${e.id}')" title="Elimina"><i class="ti ti-trash" style="font-size:13px"></i></button>
                      </div>
                    </div>`;
                  }).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;

    return `${topBar}${weekNav}${S.selEvent?renderEventoDetail(S.selEvent):''}`;
  }

  /* ── table view (with month grouping) ── */
  if (pool.length === 0) {
    const label = S.evtSub==='available'?'disponibili':S.evtSub==='paid'?'pagati':'';
    return `${topBar}<div class="card">${empty('ti-calendar-off',`Nessun evento ${label} trovato`)}</div>${S.selEvent?renderEventoDetail(S.selEvent):''}`;
  }

  // group by month
  const months = {};
  pool.forEach(e => {
    const key = e.date ? e.date.slice(0,7) : '—';
    if (!months[key]) months[key] = [];
    months[key].push(e);
  });

  const fmtMonth = k => {
    if(k==='—') return 'Senza data';
    const [y,m] = k.split('-');
    return new Date(+y,+m-1,1).toLocaleDateString('it-IT',{month:'long',year:'numeric'});
  };

  const colCount = ['colNome','colData','colOrario','colVenue','colCitta','colPrezzo','colCapienza','colAcconti','colTipo','colDresscode','colStato'].filter(k=>cfgGet('eventi',k)).length + 1;
  const tableHTML = `<div class="card" style="padding:0;overflow:hidden">
    <table>
      <thead><tr>
        ${cfgGet('eventi','colNome')     ? thSortable('Nome','name') : ''}
        ${cfgGet('eventi','colData')     ? thSortable('Data','date') : ''}
        ${cfgGet('eventi','colOrario')   ? '<th class="hide-mobile">Orario</th>' : ''}
        ${cfgGet('eventi','colVenue')    ? thSortable('Venue','venue','hide-mobile') : ''}
        ${cfgGet('eventi','colCitta')    ? '<th class="hide-mobile">Città</th>' : ''}
        ${cfgGet('eventi','colPrezzo')   ? thSortable('Prezzo','price') : ''}
        ${cfgGet('eventi','colCapienza') ? '<th>Capienza</th>' : ''}
        ${cfgGet('eventi','colAcconti')  ? '<th>Acconti</th>' : ''}
        ${cfgGet('eventi','colTipo')     ? '<th class="hide-mobile">Tipo</th>' : ''}
        ${cfgGet('eventi','colDresscode')? '<th class="hide-mobile">Dress Code</th>' : ''}
        ${cfgGet('eventi','colStato')    ? '<th>Stato</th>' : ''}
        <th></th>
      </tr></thead>
      <tbody>
      ${Object.entries(months).map(([mk, evts]) => `
        <tr><td colspan="${colCount}" style="padding:0">
          <div class="month-separator"><i class="ti ti-calendar" style="font-size:12px"></i>${fmtMonth(mk)} <span style="background:var(--bg3);border-radius:999px;padding:1px 8px;font-size:10px">${evts.length}</span></div>
        </td></tr>
        ${evts.map(e => {
          const evtAcc  = S.acconti.filter(a=>a.eventId===e.id);
          const totAcc  = evtAcc.reduce((s,a)=>s+(+a.amount||0),0);
          const cap     = parseInt(e.capacity)||0;
          const occ     = evtAcc.length;
          const capPct  = cap>0 ? pct(occ,cap) : 0;
          const capColor= capPct>=90?'var(--danger)':capPct>=70?'var(--warn)':'var(--success)';
          const isAvail = e.status==='available';
          const isSel   = S.selEvent === e.id;
          return `<tr style="cursor:pointer;${isSel?'background:var(--gold-lo);outline:1px solid var(--gold-md);outline-offset:-1px;':''}" onclick="openEvtModal('${e.id}')">
            ${cfgGet('eventi','colNome') ? `<td><div class="evt-row-name">${e.seriesId?`<span class="series-dot" title="Evento ricorrente"></span>`:''}<span class="font-medium">${esc(e.name)}</span></div></td>` : ''}
            ${cfgGet('eventi','colData')     ? `<td class="text-dim" style="white-space:nowrap">${dat(e.date)}</td>` : ''}
            ${cfgGet('eventi','colOrario')   ? `<td class="text-dim hide-mobile" style="white-space:nowrap">${e.timeStart||''}${e.timeEnd?' – '+e.timeEnd:''}</td>` : ''}
            ${cfgGet('eventi','colVenue')    ? `<td class="text-muted truncate hide-mobile" style="max-width:110px">${esc(e.venue||'—')}</td>` : ''}
            ${cfgGet('eventi','colCitta')    ? `<td class="text-dim hide-mobile">${esc(e.city||'—')}</td>` : ''}
            ${cfgGet('eventi','colPrezzo')   ? `<td><span class="text-mono font-medium">${e.price>0?eur(e.price):'—'}</span></td>` : ''}
            ${cfgGet('eventi','colCapienza') ? `<td>${cap>0?`<span class="text-sm" style="color:${capColor}">${occ}/${cap}</span><div class="cap-bar"><div class="cap-fill" style="width:${capPct}%;background:${capColor}"></div></div>`:`<span class="text-dim">—</span>`}</td>` : ''}
            ${cfgGet('eventi','colAcconti')  ? `<td>${evtAcc.length>0?`<span style="font-family:var(--font-m);font-size:12px;display:block">${evtAcc.length} preno</span><span class="text-xs text-gold">${eur(totAcc)}</span>`:`<span class="text-dim">—</span>`}</td>` : ''}
            ${cfgGet('eventi','colTipo')     ? `<td class="hide-mobile">${e.tag?badge(e.tag,'blue'):''}</td>` : ''}
            ${cfgGet('eventi','colDresscode')? `<td class="hide-mobile">${e.dresscode?badge(e.dresscode,'neutral'):''}</td>` : ''}
            ${cfgGet('eventi','colStato')    ? `<td>${evtStatusBadge(e)}</td>` : ''}
            <td onclick="event.stopPropagation()"><div class="flex gap-2" style="flex-wrap:nowrap">
              ${btnI('ti-edit',`openEvtModal('${e.id}')`,false,'Modifica')}
              ${isAvail
                ? `<button class="btn btn-success-sm" onclick="markPaid('${e.id}')"><i class="ti ti-circle-check"></i> Paga</button>`
                : `<button class="btn btn-ghost" style="font-size:12px;padding:4px 10px" onclick="markAvail('${e.id}')"><i class="ti ti-rotate-clockwise"></i> Riapri</button>`}
              ${btnI('ti-trash',`delEvento('${e.id}')`,true,'Elimina')}
            </div></td>
          </tr>`;
        }).join('')}
      `).join('')}
      </tbody>
    </table>
  </div>
  ${S.selEvent ? renderEventoDetail(S.selEvent) : ''}`;

  return `${topBar}${tableHTML}`;
}

function evtStatusBadge(e) {
  const map = {
    available: ['Disponibile','amber'],
    paid:      ['Pagato','green'],
    cancelled: ['Cancellato','red'],
    soldout:   ['Sold Out','violet'],
    private:   ['Privato','blue'],
  };
  const [t,c] = map[e.status]||['—','neutral'];
  if(e.color && e.color !== '#C9A84C') {
    return `<span class="badge" style="background:${e.color}22;color:${e.color};border:1px solid ${e.color}44">${t}</span>`;
  }
  return badge(t,c);
}
function renderEventoDetail(id) {
  const e = S.eventi.find(x=>x.id===id);
  if(!e) return '';

  const evtAcc = S.acconti.filter(a=>a.eventId===id);
  const totAcc = evtAcc.reduce((s,a)=>s+(+a.amount||0),0);
  const confAcc= evtAcc.filter(a=>a.status==='confirmed').reduce((s,a)=>s+(+a.amount||0),0);
  const cap    = parseInt(e.capacity)||0;
  const occ    = evtAcc.length;
  const capPct = cap>0 ? pct(occ,cap) : 0;
  const capColor= capPct>=90?'var(--danger)':capPct>=70?'var(--warn)':'var(--success)';
  const isAvail = e.status==='available';

  // Group acconti by group
  const byGroup = {};
  evtAcc.forEach(a => {
    if(!byGroup[a.groupId]) byGroup[a.groupId] = [];
    byGroup[a.groupId].push(a);
  });

  const groupRows = Object.entries(byGroup).map(([gId, accs]) => {
    const g = S.gruppi.find(x=>x.id===gId);
    const gTot  = accs.reduce((s,a)=>s+(+a.amount||0),0);
    const gConf = accs.filter(a=>a.status==='confirmed').reduce((s,a)=>s+(+a.amount||0),0);
    const gDue  = accs.reduce((s,a)=>s+(+a.totalDue||0),0);
    return `<div style="border:1px solid var(--border);border-radius:var(--r-md);padding:11px 14px;margin-bottom:8px">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-2">
          ${avatar(g?.name||'?')}
          <div>
            <p class="font-medium" style="font-size:13px">${esc(g?.name||'Gruppo eliminato')}</p>
            <p class="text-dim text-xs">${accs.length} accont${accs.length===1?'o':'i'}</p>
          </div>
        </div>
        <div style="text-align:right">
          <p class="text-mono font-medium text-gold">${eur(gTot)}</p>
          ${gDue>0?`<p class="text-xs text-dim">su ${eur(gDue)}</p>`:''}
        </div>
      </div>
      <div class="flex gap-3" style="flex-wrap:wrap">
        ${accs.map(a=>`<span style="font-size:11px;background:var(--bg3);padding:2px 8px;border-radius:999px;display:inline-flex;align-items:center;gap:4px">${accBadge(a.status)} <span class="text-mono">${eur(a.amount)}</span> ${dat(a.date)?`<span class="text-dim">${dat(a.date)}</span>`:''}</span>`).join('')}
      </div>
    </div>`;
  }).join('');

  return `<div class="card mt-4" style="border-color:var(--gold-md);border-width:1px">
    <div class="flex items-center justify-between mb-3">
      <div>
        <h3 class="text-head" style="font-size:18px;font-weight:600">${esc(e.name)}</h3>
        <p class="text-dim text-sm" style="margin-top:2px">${dat(e.date)}${e.venue?' · '+esc(e.venue):''}</p>
      </div>
      <div class="flex gap-2 items-center">
        ${e.tag?badge(e.tag,'blue'):''}
        ${isAvail?badge('Disponibile','amber'):badge('Pagato','green')}
        ${btnI('ti-edit',`openEvtModal('${e.id}')`,false,'Modifica evento')}
        ${isAvail
          ? `<button class="btn btn-success-sm" onclick="markPaid('${e.id}')"><i class="ti ti-circle-check"></i> Segna pagato</button>`
          : `<button class="btn btn-ghost" style="font-size:12px;padding:5px 12px" onclick="markAvail('${e.id}')"><i class="ti ti-rotate-clockwise"></i> Riapri</button>`}
        ${btnI('ti-trash',`delEvento('${e.id}')`,true,'Elimina evento')}
        ${btnI('ti-x',`deselectEvento()`,false,'Chiudi dettaglio')}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:16px">
      ${e.price>0?`<div style="background:var(--bg2);border-radius:var(--r-md);padding:10px 12px"><p class="text-xs text-dim" style="margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em">Prezzo</p><p class="text-mono font-medium">${eur(e.price)}</p></div>`:''}
      ${cap>0?`<div style="background:var(--bg2);border-radius:var(--r-md);padding:10px 12px"><p class="text-xs text-dim" style="margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em">Capienza</p><p class="text-mono font-medium" style="color:${capColor}">${occ}/${cap} <span class="text-xs">(${capPct}%)</span></p><div class="cap-bar mt-1"><div class="cap-fill" style="width:${capPct}%;background:${capColor}"></div></div></div>`:''}
      <div style="background:var(--bg2);border-radius:var(--r-md);padding:10px 12px"><p class="text-xs text-dim" style="margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em">Acconti tot.</p><p class="text-mono font-medium text-gold">${eur(totAcc)}</p></div>
      <div style="background:var(--bg2);border-radius:var(--r-md);padding:10px 12px"><p class="text-xs text-dim" style="margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em">Confermati</p><p class="text-mono font-medium text-success">${eur(confAcc)}</p></div>
      <div style="background:var(--bg2);border-radius:var(--r-md);padding:10px 12px"><p class="text-xs text-dim" style="margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em">Gruppi</p><p class="text-mono font-medium">${Object.keys(byGroup).length}</p></div>
    </div>
    ${e.notes?`<p class="text-muted text-sm mb-3" style="padding:8px 12px;background:var(--bg2);border-radius:var(--r-sm)">${esc(e.notes)}</p>`:''}
    ${cap>0?`<div class="cap-bar mb-4" style="height:5px"><div class="cap-fill" style="width:${capPct}%;background:${capColor}"></div></div>`:''}
    ${evtAcc.length===0
      ? `<p class="text-dim text-sm">Nessun acconto registrato per questo evento.</p>`
      : `<p style="font-weight:500;font-size:13px;margin-bottom:10px"><i class="ti ti-receipt" style="font-size:13px;vertical-align:-1px;margin-right:5px;color:var(--gold)"></i>Acconti per gruppo (${evtAcc.length})</p>${groupRows}`}
  </div>`;
}

function mkToggle(section, key, label, desc='') {

  return `<div class="setting-row" onclick="document.getElementById('tgl-${section}-${key}').click()">

      <div class="setting-row-label">${label}</div>
      ${desc ? `<div class="setting-row-desc">${desc}</div>` : ''}

    <div class="toggle-wrap">
      <label class="toggle" onclick="event.stopPropagation()">

        <div class="toggle-track"><div class="toggle-thumb"></div></div>

    </div>
  </div>`;
}
