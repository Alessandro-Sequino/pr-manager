/* ── STATISTICHE ──────────────────────────────────────────── */
function renderStats() {
  const totAcc  = S.acconti.reduce((s,a)=>s+(+a.amount||0),0);
  const confAcc = S.acconti.filter(a=>a.status==='confirmed').reduce((s,a)=>s+(+a.amount||0),0);
  const pendAcc = S.acconti.filter(a=>a.status==='pending').reduce((s,a)=>s+(+a.amount||0),0);
  const cancCnt = S.acconti.filter(a=>a.status==='cancelled').length;

  const byEvt = S.eventi
    .map(e=>{ const acc=S.acconti.filter(a=>a.eventId===e.id); return {name:e.name,count:acc.length,total:acc.reduce((s,a)=>s+(+a.amount||0),0)}; })
    .filter(x=>x.total>0).sort((a,b)=>b.total-a.total).slice(0,7);
  const maxEvt = Math.max(...byEvt.map(x=>x.total),1);

  const byMethod = {};
  S.acconti.filter(a=>a.paymentMethod).forEach(a => {
    byMethod[a.paymentMethod] = (byMethod[a.paymentMethod]||0) + (+a.amount||0);
  });
  const methodArr = Object.entries(byMethod).map(([name,total])=>({name,total})).sort((a,b)=>b.total-a.total);
  const maxMethod = Math.max(...methodArr.map(x=>x.total),1);

  // ── build month trend ──
  const byMonth = {};
  S.acconti.forEach(a => {
    if(!a.date) return;
    const m = a.date.slice(0,7);
    if(!byMonth[m]) byMonth[m] = {amount:0, confirmed:0};
    byMonth[m].amount    += (+a.amount||0);
    byMonth[m].confirmed += a.status==='confirmed'?(+a.amount||0):0;
  });
  const fmtMon = k => { const [y,m]=k.split('-'); return new Date(+y,+m-1,1).toLocaleDateString('it-IT',{month:'short',year:'2-digit'}); };
  const monthArr = Object.entries(byMonth).map(([k,v])=>({key:k,label:fmtMon(k),amount:v.amount,confirmed:v.confirmed})).sort((a,b)=>a.key.localeCompare(b.key));
  const maxMonth = Math.max(...monthArr.map(x=>x.amount),1);

  // SVG sparkline for month trend
  const spW=320, spH=72, spPad=4;
  const sparkline = monthArr.length < 2 ? '' : (() => {
    const pts = monthArr.map((x,i)=>{
      const xp = spPad + (i/(monthArr.length-1))*(spW-spPad*2);
      const yp = spH-spPad - (x.amount/maxMonth)*(spH-spPad*2);
      return `${xp.toFixed(1)},${yp.toFixed(1)}`;
    }).join(' ');
    const area = `M${monthArr.map((x,i)=>{
      const xp=spPad+(i/(monthArr.length-1))*(spW-spPad*2);
      const yp=spH-spPad-(x.amount/maxMonth)*(spH-spPad*2);
      return `${xp.toFixed(1)},${yp.toFixed(1)}`;
    }).join(' L')} L${(spW-spPad).toFixed(1)},${spH} L${spPad},${spH} Z`;
    const lastX = spPad + ((monthArr.length-1)/(monthArr.length-1))*(spW-spPad*2);
    const lastY = spH-spPad-(monthArr[monthArr.length-1].amount/maxMonth)*(spH-spPad*2);
    return `<svg viewBox="0 0 ${spW} ${spH}" style="width:100%;height:${spH}px;display:block;margin-bottom:10px" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#C9A84C" stop-opacity=".25"/>
          <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${area}" fill="url(#sg)"/>
      <polyline points="${pts}" fill="none" stroke="#C9A84C" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="3" fill="#C9A84C"/>
    </svg>`;
  })();

  const byGrp = S.gruppi
    .map(g=>{ const acc=S.acconti.filter(a=>a.groupId===g.id); return {name:g.name,count:acc.length,total:acc.reduce((s,a)=>s+(+a.amount||0),0)}; })
    .filter(x=>x.total>0).sort((a,b)=>b.total-a.total).slice(0,7);
  const maxGrp = Math.max(...byGrp.map(x=>x.total),1);

  const bars = (items,max,labelKey='name',valKey='total') => items.length===0
    ? `<p class="text-dim text-sm">Nessun dato disponibile</p>`
    : items.map(x=>`<div class="bar-row">
        <span class="bar-label" title="${esc(x[labelKey])}">${esc(x[labelKey])}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${pct(x[valKey],max)}%"></div></div>
        <span class="bar-value">${eur(x[valKey])}</span>
      </div>`).join('');

  const trendRows = monthArr.length===0
    ? `<p class="text-dim text-sm">Nessun dato disponibile</p>`
    : monthArr.map(x=>`<div class="bar-row">
        <span class="bar-label">${esc(x.label)}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${pct(x.amount,maxMonth)}%"></div></div>
        <span class="bar-value">${eur(x.amount)}</span>
      </div>`).join('');

  return `
    <div class="metric-grid grid-4 mb-5">
      ${metric('ti-receipt','Totale acconti',eur(totAcc))}
      ${metric('ti-circle-check','Confermati',eur(confAcc),totAcc>0?`${pct(confAcc,totAcc)}% del totale`:'')}
      ${metric('ti-clock','In attesa',eur(pendAcc))}
      ${metric('ti-x','Annullati',cancCnt+' acconti')}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
      <div class="card">
        <p class="card-title">Top eventi per incasso</p>
        ${bars(byEvt,maxEvt)}
      </div>
      <div class="card">
        <p class="card-title">Top gruppi per spesa</p>
        ${bars(byGrp,maxGrp)}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
      <div class="card">
        <p class="card-title">Trend mensile incassi</p>
        ${sparkline}${trendRows}
      </div>
      <div class="card">
        <p class="card-title">Metodi di pagamento</p>
        ${bars(methodArr,maxMethod)}
      </div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:18px 20px 0"><p class="card-title">Riepilogo eventi</p></div>
      ${S.eventi.length===0 ? `<div style="padding:0 20px 18px">${empty('ti-calendar-off','Nessun evento')}</div>` :
        `<table>
          <thead><tr>
            <th>Evento</th><th>Data</th><th class="hide-mobile">Venue</th><th>Capienza</th><th>N° acconti</th><th>Totale</th><th>Status</th>
          </tr></thead>
          <tbody>${S.eventi.sort((a,b)=>(a.date||'').localeCompare(b.date||'')).map(e=>{
            const acc=S.acconti.filter(a=>a.eventId===e.id);
            const tot=acc.reduce((s,a)=>s+(+a.amount||0),0);
            return `<tr>
              <td class="font-medium">${esc(e.name)}</td>
              <td class="text-dim">${dat(e.date)}</td>
              <td class="text-muted hide-mobile">${esc(e.venue||'—')}</td>
              <td class="text-dim">${e.capacity||'—'}</td>
              <td class="text-mono">${acc.length}</td>
              <td class="text-mono text-gold">${eur(tot)}</td>
              <td>${badge(e.status==='available'?'Disponibile':'Pagato',e.status==='available'?'amber':'green')}</td>
            </tr>`;
          }).join('')}</tbody>
        </table>`}
    </div>`;
}

/* ── Multi-event acconto helpers ─────────────────────────── */
function onAccGroupChange(groupId) {
  S.accFormGroupId = groupId;
  S.accFormSelectedEvts = [];
  S.accFormAmounts = {};
  render();
}

function saveAccAmounts() {
  // flush current DOM input values → state (called before any re-render that would wipe the DOM)
  S.accFormSelectedEvts.forEach(evtId => {
    const amt = document.getElementById(`af-amount-${evtId}`)?.value || '';
    const due = document.getElementById(`af-totaldue-${evtId}`)?.value || '';
    S.accFormAmounts[evtId] = { amount: amt, totalDue: due };
  });
}

function toggleAccEvent(evtId) {
  saveAccAmounts(); // preserve current amounts before re-render
  if (S.accFormSelectedEvts.includes(evtId)) {
    S.accFormSelectedEvts = S.accFormSelectedEvts.filter(x => x !== evtId);
  } else {
    S.accFormSelectedEvts = [...S.accFormSelectedEvts, evtId];
  }
  render();
}

function editAcconto(id) {
  const a = S.acconti.find(x=>x.id===id); if(!a) return;
  S.editAccId=id; S.showAccForm=true;
  S.accFormGroupId=''; S.accFormSelectedEvts=[]; S.accFormAmounts={};
  render();
  setTimeout(()=>{ document.getElementById('af-group')?.focus();
    const set=(el,v)=>{ const e=document.getElementById(el); if(e) e.value=v||''; };
    set('af-group',a.groupId); set('af-event',a.eventId||'');
    set('af-amount',a.amount); set('af-totaldue',a.totalDue||'');
    set('af-method',a.paymentMethod||'');
    set('af-date',a.date||''); set('af-status',a.status||'pending'); set('af-note',a.note||'');
  },0);
}

function saveAcconto() {
  // ── EDIT: single event (unchanged behaviour) ──
  if (S.editAccId) {
    const gId          = document.getElementById('af-group')?.value;
    const eId          = document.getElementById('af-event')?.value||'';
    const amount       = document.getElementById('af-amount')?.value;
    const totalDue     = document.getElementById('af-totaldue')?.value||'';
    const paymentMethod= document.getElementById('af-method')?.value||'';
    const date         = document.getElementById('af-date')?.value||'';
    const status       = document.getElementById('af-status')?.value||'pending';
    const note         = document.getElementById('af-note')?.value?.trim()||'';
    if(!gId||!amount){ toast('Gruppo e importo sono obbligatori','error'); return; }
    S.acconti = S.acconti.map(a=>a.id===S.editAccId?{...a,groupId:gId,eventId:eId,amount,totalDue,paymentMethod,date,status,note}:a);
    toast('Acconto aggiornato');
    persist('prm_acconti',S.acconti);
    S.showAccForm=false; S.editAccId=null;
    render();
    return;
  }

  // ── NEW: multi-event ──
  const gId = S.accFormGroupId;
  if (!gId) { toast('Seleziona un gruppo','error'); return; }
  if (S.accFormSelectedEvts.length === 0) { toast('Seleziona almeno un evento','error'); return; }

  saveAccAmounts(); // flush DOM → state before reading

  const paymentMethod = document.getElementById('af-method')?.value||'';
  const date          = document.getElementById('af-date')?.value||'';
  const status        = document.getElementById('af-status')?.value||'pending';
  const note          = document.getElementById('af-note')?.value?.trim()||'';

  let count = 0;
  const now = Date.now();
  S.accFormSelectedEvts.forEach((evtId, i) => {
    const saved  = S.accFormAmounts[evtId]||{};
    const amount = (saved.amount||'').toString().trim();
    if (!amount || +amount <= 0) return; // skip events without amount
    const totalDue = (saved.totalDue||'').toString().trim();
    S.acconti.push({ id:uid(), groupId:gId, eventId:evtId, amount, totalDue, paymentMethod, date, status, note, ts: now + i });
    count++;
  });

  if (count === 0) { toast('Inserisci almeno un importo maggiore di zero','error'); return; }
  toast(`${count} accont${count===1?'o':'i'} salvat${count===1?'o':'i'}`);
  persist('prm_acconti', S.acconti);
  S.showAccForm=false; S.editAccId=null;
  S.accFormGroupId=''; S.accFormSelectedEvts=[]; S.accFormAmounts={};
  render();
}

function delAcconto(id) {
  const backup = [...S.acconti];
  S.acconti=S.acconti.filter(a=>a.id!==id);
  persist('prm_acconti',S.acconti); render();
  deleteWithUndo('Acconto eliminato', () => backup, b => { S.acconti=b; persist('prm_acconti',S.acconti); });
}

function duplicateAcconto(id) {
  const a = S.acconti.find(x=>x.id===id); if(!a) return;
  const clone = {...a, id:uid(), date: isoDate(new Date()), status: 'pending', ts:Date.now()};
  S.acconti = [...S.acconti, clone];
  persist('prm_acconti',S.acconti); toast('Acconto duplicato'); render();
}

function toggleAcc(id) {
  S.acconti=S.acconti.map(a=>{

function exportAcconti() {
  const rows=[['Gruppo','Evento','Data','Acconto (€)','Totale Dovuto (€)','Saldo (€)','Metodo Pagamento','Stato','Note']];
  S.acconti.forEach(a=>{
    const g=S.gruppi.find(x=>x.id===a.groupId);
    const e=S.eventi.find(x=>x.id===a.eventId);
    const saldo = (+a.totalDue||0) - (+a.amount||0);
    rows.push([
      g?.name||'—', e?.name||'—', a.date||'—',
      a.amount||'0', a.totalDue||'', a.totalDue?saldo:'',
      a.paymentMethod||'', a.status, a.note||''
    ]);
  });
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=`acconti_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); toast('CSV esportato','info');
}

function saveEvento() {
  const name=document.getElementById('ef-name')?.value?.trim();
  const date=document.getElementById('ef-date')?.value||'';
  if(!name || !date){ toast('Nome e Data sono obbligatori','error'); return; }

  const g = id => document.getElementById(id);
  const gv = id => g(id)?.value?.trim()||'';
  const gn = id => g(id)?.value||'';

  const data = {
    name, date,
    status:      gv('ef-status') || 'available',
    timeStart:   gv('ef-time-start'),
    timeEnd:     gv('ef-time-end'),
    venue:       gv('ef-venue'),
    city:        gv('ef-city'),
    address:     gv('ef-address'),
    maplink:     gv('ef-maplink'),
    price:       gn('ef-price')      || '0',
    priceF:      gn('ef-price-f'),
    priceM:      gn('ef-price-m'),
    priceList:   gn('ef-price-list'),
    priceTable:  gn('ef-price-table'),
    currency:    gv('ef-currency')   || 'EUR',
    capacity:    gn('ef-capacity'),
    capacityPr:  gn('ef-capacity-pr'),
    capacityList:gn('ef-capacity-lst'),
    minAge:      gn('ef-minage'),
    tag:         gv('ef-tag'),
    dresscode:   gv('ef-dresscode'),
    contact:     gv('ef-contact'),
    contactPhone:gv('ef-contact-phone'),
    eventlink:   gv('ef-eventlink'),
    social:      gv('ef-social'),
    notes:       gv('ef-notes'),
    color:       gv('ef-color') || '#C9A84C',
  };

  if(S.editEvtId) {
    S.eventi = S.eventi.map(e => e.id===S.editEvtId ? {...e,...data} : e);
    toast('Evento aggiornato');
    closeEvtModal();
  } else {
    const isRecur = g('ef-is-recurring')?.checked;
    if(isRecur) {
      const endD = gv('ef-recur-end');
      const interval = gv('ef-recur-interval') || 'weekly';
      const daysChecked = Array.from(document.querySelectorAll('input[name="ef-recur-days"]:checked')).map(cb=>parseInt(cb.value));
      if(!endD){ toast('Inserisci la data di fine serie','error'); return; }
      if(interval==='weekly' && daysChecked.length===0){ toast('Seleziona almeno un giorno','error'); return; }

      let curr = new Date(date+'T12:00:00');
      const end = new Date(endD+'T12:00:00');
      if(curr>end){ toast('La data fine deve essere dopo la data inizio','error'); return; }
      const sId = uid(); let count=0;

      if(interval==='weekly') {
        while(curr<=end){
          if(daysChecked.includes(curr.getDay())){
            S.eventi.push({id:uid(),...data,date:curr.toISOString().split('T')[0],seriesId:sId,status:data.status||'available',ts:Date.now()});
            count++;
          }
          curr.setDate(curr.getDate()+1);
        }
      } else if(interval==='biweekly') {
        while(curr<=end){
          S.eventi.push({id:uid(),...data,date:curr.toISOString().split('T')[0],seriesId:sId,status:data.status||'available',ts:Date.now()});
          count++; curr.setDate(curr.getDate()+14);
        }
      } else if(interval==='monthly') {
        while(curr<=end){
          S.eventi.push({id:uid(),...data,date:curr.toISOString().split('T')[0],seriesId:sId,status:data.status||'available',ts:Date.now()});
          count++; curr.setMonth(curr.getMonth()+1);
        }
      }
      if(count===0){ toast('Nessun evento generato — controlla date e giorni','error'); return; }
      toast(`${count} eventi generati`);
      closeEvtModal();
    } else {
      S.eventi.push({id:uid(),...data,ts:Date.now()});
      toast('Evento creato');
      closeEvtModal();
    }
  }
  persist('prm_eventi',S.eventi); render();
}

function delEvento(id) {
  const ev = S.eventi.find(e=>e.id===id);
  if(!ev) return;
  const backup = [...S.eventi];

  if(ev.seriesId) {
    const choice = confirm(
      `"${ev.name}" fa parte di una serie ricorrente.\n\nOK → elimina TUTTA la serie\nAnnulla → elimina SOLO questo evento`
    );
    if(choice) {
      // delete whole series
      S.eventi = S.eventi.filter(e=>e.seriesId!==ev.seriesId);
      persist('prm_eventi',S.eventi);
      if(S.selEvent===id) S.selEvent=null;
      render();
      deleteWithUndo('Serie eliminata', () => backup, b => { S.eventi=b; persist('prm_eventi',S.eventi); });
    } else {
      // delete only this event (no second confirm — the first confirm already asked)
      S.eventi = S.eventi.filter(e=>e.id!==id);
      persist('prm_eventi',S.eventi);
      if(S.selEvent===id) S.selEvent=null;
      render();
      deleteWithUndo('Evento eliminato', () => backup, b => { S.eventi=b; persist('prm_eventi',S.eventi); });
    }
    return;
  }

  if(!confirm(`Eliminare "${ev.name}"?`)) return;
  S.eventi = S.eventi.filter(e=>e.id!==id);
  persist('prm_eventi',S.eventi);
  if(S.selEvent===id) S.selEvent=null;
  render();
  deleteWithUndo('Evento eliminato', () => backup, b => { S.eventi=b; persist('prm_eventi',S.eventi); });
}

function markPaid(id)  { S.eventi=S.eventi.map(e=>e.id===id?{...e,status:'paid'}:e);      persist('prm_eventi',S.eventi); toast('Evento segnato come pagato'); render(); }
function markAvail(id) { S.eventi=S.eventi.map(e=>e.id===id?{...e,status:'available'}:e); persist('prm_eventi',S.eventi); toast('Evento riaperto'); render(); }

/* ── PWA Manifest ─────────────────────────────────────────── */
function injectManifest() {
  try {
    const svgIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="110" fill="#08080F"/><circle cx="256" cy="210" r="86" fill="none" stroke="#C9A84C" stroke-width="28"/><path d="M160 360 Q256 440 352 360" fill="none" stroke="#C9A84C" stroke-width="28" stroke-linecap="round"/><circle cx="256" cy="210" r="22" fill="#C9A84C"/></svg>`;
    const b64 = btoa(svgIcon);
    const manifest = {name:"PR Manager",short_name:"PR",description:"Gestionale eventi, gruppi e acconti",start_url:".",display:"standalone",background_color:"#08080F",theme_color:"#08080F",icons:[{src:`data:image/svg+xml;base64,${b64}`,sizes:"512x512",type:"image/svg+xml"}]};
    const blob = new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
    const link = document.createElement('link');
    link.rel='manifest'; link.href=URL.createObjectURL(blob);
    document.head.appendChild(link);
  } catch(e){}
}

            ${btn('Modifica',`editPacchetto('${p.id}')`, 'btn-secondary')}
            ${btnI('ti-trash',`delPacchetto('${p.id}')`,true,'Elimina pacchetto')}
          </div>
        </div>
        ${ev ? `<p class="text-muted text-sm mb-3"><i class="ti ti-calendar-event" style="font-size:12px;vertical-align:-1px;margin-right:4px"></i>${esc(ev.name)} · ${dat(ev.date)}${ev.venue?' · '+esc(ev.venue):''}</p>` : ''}

        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:14px">
          <div class="stat-chip"><div class="sc-val text-gold">${eur(p.prezzoBase)}</div><div class="sc-lbl">€ / persona</div></div>
          <div class="stat-chip"><div class="sc-val">${pren.length}</div><div class="sc-lbl">Prenotazioni</div></div>
          <div class="stat-chip"><div class="sc-val">${totPax}</div><div class="sc-lbl">Persone tot.</div></div>
          <div class="stat-chip"><div class="sc-val text-gold">${eur(totAcc)}</div><div class="sc-lbl">Acconti</div></div>
          <div class="stat-chip"><div class="sc-val ${totSaldo>0?'text-danger':'text-success'}">${eur(totSaldo)}</div><div class="sc-lbl">Saldo residuo</div></div>
        </div>

        ${divider()}

        <div class="grid-2" style="gap:10px;margin-bottom:14px">
          <div class="pkg-block">
            <div class="pkg-block-title"><i class="ti ti-building" style="font-size:11px"></i>Alloggio</div>
            ${p.stay && p.stay !== 'Nessuno'
              ? `<p class="font-medium text-sm">${esc(p.stayName||p.stay)}</p>
                 <p class="text-dim text-sm">${p.notti?p.notti+' nott'+(+p.notti===1?'e':'i'):''} ${p.checkin&&p.checkout?dat(p.checkin)+' → '+dat(p.checkout):''}</p>
                 ${p.stayPrice?`<p class="text-mono text-gold" style="font-size:12px;margin-top:4px">${eur(p.stayPrice)}</p>`:''}`
              : `<p class="text-dim text-sm">Non incluso</p>`}
          </div>
          <div class="pkg-block">
            <div class="pkg-block-title"><i class="ti ti-car" style="font-size:11px"></i>Transfer</div>
            ${p.transport && p.transport !== 'Nessuno'
              ? `<p class="font-medium text-sm">${esc(p.transport)}</p>
                 <p class="text-dim text-sm">${p.transFrom?esc(p.transFrom):''}${p.transFrom&&p.transTo?' → ':''}${p.transTo?esc(p.transTo):''}</p>
                 <p class="text-dim text-sm">${p.transTime?'Pickup: '+p.transTime:''}${p.transSeats?' · '+p.transSeats+' posti':''}</p>
                 ${p.transPrice?`<p class="text-mono text-gold" style="font-size:12px;margin-top:4px">${eur(p.transPrice)}/pers.</p>`:''}`
              : `<p class="text-dim text-sm">Non incluso</p>`}
          </div>
        </div>

        ${p.notes ? `<div class="form-bg mb-4"><p class="text-sm text-muted"><i class="ti ti-info-circle" style="font-size:12px;vertical-align:-1px;margin-right:4px"></i>${esc(p.notes)}</p></div>` : ''}

        ${divider()}

        <div class="flex items-center justify-between mb-3">
          <p style="font-weight:500;font-size:14px"><i class="ti ti-users" style="font-size:14px;vertical-align:-2px;margin-right:5px;color:var(--gold)"></i>Prenotazioni (${pren.length})</p>
          ${btn('+ Prenotazione','openPrenForm()','btn-secondary','ti-plus')}
        </div>
        ${prenForm}${prenRows}
      </div>`;
    }
  } else {
    detail = `<div class="card">${empty('ti-package','Seleziona un pacchetto dalla lista o creane uno nuovo')}</div>`;
  }

  return `<div style="display:grid;grid-template-columns:260px 1fr;gap:14px;align-items:start">${sidebar}<div>${detail}</div></div>`;
}

/* ══════════════════════════════════════════════════════════
   LISTE OSPITI  –  Guest list per evento con check-in
   ══════════════════════════════════════════════════════════ */

function renderListe() {
  const evList = [...S.eventi].sort((a,b) => (a.date||'').localeCompare(b.date||''));
  const selEv  = S.listeEventId ? S.eventi.find(e => e.id === S.listeEventId) : null;
  const ospiti = selEv ? (selEv.ospiti||[]) : [];

  const q = (S.listeSearch||'').toLowerCase();
  const ospFilt = q
    ? ospiti.filter(o => (o.nome+' '+(o.cognome||'')+(o.note||'')).toLowerCase().includes(q))
    : ospiti;

  const cntAll  = ospiti.length;
  const cntEnt  = ospiti.filter(o => o.status==='entrato').length;
  const cntNS   = ospiti.filter(o => o.status==='no-show').length;
  const cntAtt  = ospiti.filter(o => o.status==='attesa' || !o.status).length;
  const cntVip  = ospiti.filter(o => o.isVip).length;
  const fillPct = cntAll ? Math.round(cntEnt/cntAll*100) : 0;

  function ospBadge(s) {
    const m = {entrato:['Entrato','green'],attesa:['Attesa','amber'],'no-show':['No-Show','red']};
    const [t,c] = m[s||'attesa']||['Attesa','amber']; return badge(t,c);
  }

  /* ── Sidebar: event list ── */
  const sidebar = `<div class="card" style="padding:14px">
    <p style="font-weight:500;font-size:13px;margin-bottom:10px">Seleziona evento</p>
    ${evList.length===0 ? `<p class="text-dim text-sm">Nessun evento creato.</p><div style="margin-top:8px">${btn('Vai a Eventi','switchTab(\'eventi\')','btn-ghost','ti-arrow-right')}</div>` :
      evList.map(e => {
        const cnt  = (e.ospiti||[]).length;
        const entr = (e.ospiti||[]).filter(o=>o.status==='entrato').length;
        return `<button class="evt-pill${S.listeEventId===e.id?' ev-active':''}" onclick="selectListeEvt('${e.id}')">
          <div class="flex items-center justify-between">
            <span class="font-medium" style="font-size:13px">${esc(e.name)}</span>
            ${cnt>0 ? `<span class="badge badge-neutral" style="font-size:10px">${entr}/${cnt}</span>` : ''}
          </div>
          <p class="text-dim text-sm" style="margin-top:2px">${dat(e.date)}${e.venue?' · '+esc(e.venue):''}</p>
        </button>`;
      }).join('')}
  </div>`;

  /* ── Right panel ── */
  let panel = '';
  if (!selEv) {
    panel = `<div class="card">${empty('ti-list-check','Seleziona un evento per gestire la lista ospiti')}</div>`;
  } else {
    const gOpts = S.gruppi.map(g => `<option value="${g.id}">${esc(g.name)}</option>`).join('');

    const ospiteForm = S.showOspiteForm ? `<div class="form-bg mb-4">
      <p style="font-weight:500;font-size:13px;margin-bottom:12px">Aggiungi ospite</p>
      <div class="grid-4 mb-3">
        ${frow('Nome *',`<input id="of-nome" class="field w-full" placeholder="Nome">`)}
        ${frow('Cognome',`<input id="of-cogn" class="field w-full" placeholder="Cognome">`)}
        ${frow('Telefono',`<input id="of-tel" class="field w-full" placeholder="+39...">`)}
        ${frow('Gruppo (opz.)',`<select id="of-group" class="field w-full"><option value="">— nessuno —</option>${gOpts}</select>`)}
      </div>
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:12px">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
          <input type="checkbox" id="of-vip" style="accent-color:var(--gold)">
          <i class="ti ti-crown" style="color:var(--gold);font-size:13px"></i> VIP
        </label>
      </div>
      ${frow('Note',`<input id="of-note" class="field w-full" placeholder="Note...">`)}
      <div class="flex gap-2 mt-3">
        ${btn('Aggiungi','addOspite()','btn-primary','ti-user-plus')}
        ${btn('Annulla','S.showOspiteForm=false;render()','btn-ghost')}
        ${S.gruppi.length>0 ? btn('Importa da gruppo','importFromGroup()','btn-ghost','ti-users') : ''}
      </div>
    </div>` : '';

    const listHeader = cntAll > 0 ? `
      <div style="display:grid;grid-template-columns:1fr 80px 80px auto;gap:10px;padding:7px 12px;background:var(--bg2);border-bottom:1px solid var(--border);border-radius:var(--r-md) var(--r-md) 0 0">
        <span class="field-label" style="margin:0">Ospite</span>
        <span class="field-label" style="margin:0">Gruppo</span>
        <span class="field-label" style="margin:0">Stato</span>
        <span></span>
      </div>` : '';

    const ospRows = ospFilt.length === 0
      ? (cntAll === 0
          ? empty('ti-user-off','Lista vuota — aggiungi il primo ospite')
          : empty('ti-search','Nessun ospite corrisponde alla ricerca'))
      : ospFilt.map(o => {
          const g       = S.gruppi.find(x => x.id === o.groupId);
          const isEntr  = o.status === 'entrato';
          const isNS    = o.status === 'no-show';
          return `<div class="ospite-row st-${o.status||'attesa'}">
            <div class="flex items-center gap-2">
              ${o.isVip ? `<i class="ti ti-crown" style="font-size:13px;color:var(--gold);flex-shrink:0"></i>` : ''}
              <div>
                <p class="font-medium" style="font-size:13px">${esc(o.nome+(o.cognome?' '+o.cognome:''))}</p>
                ${o.tel ? `<p class="text-dim text-sm">${esc(o.tel)}</p>` : ''}
                ${o.orarioIngresso ? `<p style="font-size:11px;color:var(--success)">Entrato ${o.orarioIngresso}</p>` : ''}
                ${o.note ? `<p class="text-dim text-sm">${esc(o.note)}</p>` : ''}
              </div>
            </div>
            <span class="text-dim text-sm">${g ? esc(g.name) : '—'}</span>
            <div>${ospBadge(o.status)}</div>
            <div class="flex gap-1">
              ${!isEntr ? `<button class="checkin-btn" onclick="checkInOspite('${selEv.id}','${o.id}')"><i class="ti ti-login" style="font-size:12px"></i>Check-in</button>` : ''}
              ${!isNS && !isEntr ? `${btnI('ti-user-off',`noShowOspite('${selEv.id}','${o.id}')`,false,'No-show')}` : ''}
              ${isEntr || isNS ? `${btnI('ti-rotate-clockwise',`resetOspite('${selEv.id}','${o.id}')`,false,'Riporta in attesa')}` : ''}
              ${btnI('ti-trash',`delOspite('${selEv.id}','${o.id}')`,true,'Rimuovi')}
            </div>
          </div>`;
        }).join('');

    panel = `<div class="card">
      <div class="flex items-center justify-between mb-3">
        <div>
          <h2 class="text-head" style="font-size:18px;font-weight:600">${esc(selEv.name)}</h2>
          <p class="text-dim text-sm mt-1">${dat(selEv.date)}${selEv.venue?' · '+esc(selEv.venue):''}</p>
        </div>
        <div class="flex gap-2">
          ${btn(S.showOspiteForm?'Chiudi':'+ Ospite','S.showOspiteForm=!S.showOspiteForm;render()',S.showOspiteForm?'btn-ghost':'btn-primary','ti-user-plus')}
          ${cntAll>0 ? btn('Esporta CSV','exportLista()','btn-ghost','ti-download') : ''}
        </div>
      </div>

      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:12px">
        <div class="stat-chip"><div class="sc-val">${cntAll}</div><div class="sc-lbl">In lista</div></div>
        <div class="stat-chip"><div class="sc-val" style="color:var(--warn)">${cntAtt}</div><div class="sc-lbl">Attesa</div></div>
        <div class="stat-chip"><div class="sc-val" style="color:var(--success)">${cntEnt}</div><div class="sc-lbl">Entrati</div></div>
        <div class="stat-chip"><div class="sc-val" style="color:var(--danger)">${cntNS}</div><div class="sc-lbl">No-show</div></div>
        <div class="stat-chip"><div class="sc-val" style="color:var(--gold)">${cntVip}</div><div class="sc-lbl">VIP</div></div>
      </div>

      ${cntAll > 0 ? `<div class="fill-bar mb-3"><div class="fill-bar-inner" style="width:${fillPct}%;background:var(--success)"></div></div>` : ''}

      ${ospiteForm}

      ${cntAll > 4 ? `<div class="search-wrap mb-3"><i class="ti ti-search search-ico"></i>
        <input class="field w-full" placeholder="Cerca ospite..." value="${esc(S.listeSearch)}" oninput="S.listeSearch=this.value;render()">
      </div>` : ''}

      ${cntAll > 0 ? `<div style="border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden">${listHeader}${ospRows}</div>` : ospRows}
    </div>`;
  }

  return `<div style="display:grid;grid-template-columns:230px 1fr;gap:14px;align-items:start">${sidebar}<div>${panel}</div></div>`;
}

/* ── Actions: Pacchetti ───────────────────────────────────── */
function addPacchetto()    { S.showPkgForm=true; S.editPkgId=null; S.selPacchetto=null; S.showPrenForm=false; render(); setTimeout(()=>document.getElementById('pf-nome')?.focus(),50); }
function editPacchetto(id) { S.showPkgForm=true; S.editPkgId=id; S.selPacchetto=id; S.showPrenForm=false; render(); setTimeout(()=>document.getElementById('pf-nome')?.focus(),50); }
function closePkgForm()    { S.showPkgForm=false; S.editPkgId=null; render(); }
function selPkg(id)        { S.selPacchetto = (S.selPacchetto===id?null:id); S.showPkgForm=false; S.showPrenForm=false; render(); }

function savePacchetto() {
  const nome = document.getElementById('pf-nome')?.value?.trim();
  if(!nome) { toast('Inserisci il nome del pacchetto','error'); return; }
  const g = id => document.getElementById(id);
  const data = {
    nome,
    status:     g('pf-status')?.value  || 'disponibile',
    eventId:    g('pf-event')?.value   || '',
    prezzoBase: g('pf-price')?.value   || '0',
    paxMin:     g('pf-pax-min')?.value || '',
    paxMax:     g('pf-pax-max')?.value || '',
    stay:       g('pf-stay')?.value    || 'Nessuno',
    stayName:   g('pf-stay-name')?.value?.trim() || '',
    notti:      g('pf-notti')?.value   || '',
    stayPrice:  g('pf-stay-price')?.value || '',
    checkin:    g('pf-checkin')?.value || '',
    checkout:   g('pf-checkout')?.value || '',
    transport:  g('pf-trans')?.value   || 'Nessuno',
    transFrom:  g('pf-trans-from')?.value?.trim() || '',
    transTo:    g('pf-trans-to')?.value?.trim()   || '',
    transTime:  g('pf-trans-time')?.value  || '',
    transPrice: g('pf-trans-price')?.value || '',
    transSeats: g('pf-trans-seats')?.value || '',
    notes:      g('pf-notes')?.value?.trim() || '',
  };
  if (S.editPkgId) {
    S.pacchetti = S.pacchetti.map(p => p.id===S.editPkgId ? {...p,...data} : p);
    toast('Pacchetto aggiornato');
    S.selPacchetto = S.editPkgId;
  } else {
    const np = { id:uid(), ...data, ts:Date.now() };
    S.pacchetti = [...S.pacchetti, np];
    S.selPacchetto = np.id;
    toast('Pacchetto creato');
  }
  persist('prm_pacchetti', S.pacchetti);
  S.showPkgForm=false; S.editPkgId=null; render();
}

function delPacchetto(id) {
  if(!confirm('Eliminare questo pacchetto e tutte le sue prenotazioni?')) return;
  const bkP=[...S.pacchetti], bkR=[...S.prenotazioniPkg];
  S.pacchetti = S.pacchetti.filter(p => p.id!==id);
  S.prenotazioniPkg = S.prenotazioniPkg.filter(r => r.pacchettoId!==id);
  S.selPacchetto=null; S.showPkgForm=false;
  persist('prm_pacchetti',S.pacchetti); persist('prm_prenp',S.prenotazioniPkg); render();
  deleteWithUndo('Pacchetto eliminato',()=>({p:bkP,r:bkR}),b=>{S.pacchetti=b.p;S.prenotazioniPkg=b.r;persist('prm_pacchetti',S.pacchetti);persist('prm_prenp',S.prenotazioniPkg);});
}

function openPrenForm()  { S.showPrenForm=true; S.editPrenId=null; render(); setTimeout(()=>document.getElementById('prf-g')?.focus(),50); }

function editPren(id) {
  const r = S.prenotazioniPkg.find(x=>x.id===id); if(!r) return;
  S.showPrenForm=true; S.editPrenId=id; render();
  setTimeout(()=>{
    const set=(el,v)=>{const e=document.getElementById(el);if(e)e.value=v||'';};
    set('prf-g',r.groupId); set('prf-pax',r.persone); set('prf-acc',r.acconto);
    set('prf-tot',r.totale||''); set('prf-data',r.data||isoDate(new Date())); set('prf-st',r.status||'pending'); set('prf-note',r.note||'');
  }, 50);
}

function savePren() {
  const gId = document.getElementById('prf-g')?.value;
  const pax  = document.getElementById('prf-pax')?.value;
  if(!gId||!pax) { toast('Gruppo e numero persone sono obbligatori','error'); return; }
  const data = {
    groupId:gId, persone:pax, pacchettoId:S.selPacchetto,
    acconto:  document.getElementById('prf-acc')?.value  || '0',
    totale:   document.getElementById('prf-tot')?.value  || '',
    data:     document.getElementById('prf-data')?.value || '',
    status:   document.getElementById('prf-st')?.value   || 'pending',
    note:     document.getElementById('prf-note')?.value?.trim() || '',
  };
  if (S.editPrenId) {
    S.prenotazioniPkg = S.prenotazioniPkg.map(r => r.id===S.editPrenId ? {...r,...data} : r);
    toast('Prenotazione aggiornata');
  } else {
    S.prenotazioniPkg = [...S.prenotazioniPkg, {id:uid(),...data,ts:Date.now()}];
    toast('Prenotazione aggiunta');
  }
  persist('prm_prenp',S.prenotazioniPkg);
  S.showPrenForm=false; S.editPrenId=null; render();
}

function delPren(id) {
  const bk = [...S.prenotazioniPkg];
  S.prenotazioniPkg = S.prenotazioniPkg.filter(r => r.id!==id);
  persist('prm_prenp',S.prenotazioniPkg); render();
  deleteWithUndo('Prenotazione eliminata',()=>bk,b=>{S.prenotazioniPkg=b;persist('prm_prenp',S.prenotazioniPkg);});
}

/* ── Actions: Liste Ospiti ────────────────────────────────── */
function selectListeEvt(id) { S.listeEventId=id; S.listeSearch=''; S.showOspiteForm=false; render(); }

function addOspite() {
  const nome = document.getElementById('of-nome')?.value?.trim();
  if(!nome || !S.listeEventId) { toast('Inserisci almeno il nome','error'); return; }
  const ospite = {
    id: uid(), nome,
    cognome:  document.getElementById('of-cogn')?.value?.trim()  || '',
    tel:      document.getElementById('of-tel')?.value?.trim()   || '',
    groupId:  document.getElementById('of-group')?.value         || '',
    isVip:    document.getElementById('of-vip')?.checked         || false,
    note:     document.getElementById('of-note')?.value?.trim()  || '',
    status:   'attesa', ts: Date.now(),
  };
  S.eventi = S.eventi.map(e => e.id!==S.listeEventId ? e : {...e, ospiti:[...(e.ospiti||[]),ospite]});
  persist('prm_eventi',S.eventi); S.showOspiteForm=false; toast('Ospite aggiunto'); render();
}

function delOspite(evtId, ospId) {
  const bk = [...S.eventi];
  S.eventi = S.eventi.map(e => e.id!==evtId ? e : {...e, ospiti:(e.ospiti||[]).filter(o=>o.id!==ospId)});
  persist('prm_eventi',S.eventi); render();
  deleteWithUndo('Ospite rimosso',()=>bk,b=>{S.eventi=b;persist('prm_eventi',S.eventi);});
}

function checkInOspite(evtId, ospId) {
  const now = new Date();
  const hm  = now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  S.eventi = S.eventi.map(e => e.id!==evtId ? e : {
    ...e, ospiti:(e.ospiti||[]).map(o => o.id!==ospId ? o : {...o,status:'entrato',orarioIngresso:hm})
  });
  persist('prm_eventi',S.eventi); toast('✓ Check-in effettuato alle '+hm); render();
}

function noShowOspite(evtId, ospId) {
  S.eventi = S.eventi.map(e => e.id!==evtId ? e : {
    ...e, ospiti:(e.ospiti||[]).map(o => o.id!==ospId ? o : {...o,status:'no-show',orarioIngresso:''})
  });
  persist('prm_eventi',S.eventi); render();
}

function resetOspite(evtId, ospId) {
  S.eventi = S.eventi.map(e => e.id!==evtId ? e : {
    ...e, ospiti:(e.ospiti||[]).map(o => o.id!==ospId ? o : {...o,status:'attesa',orarioIngresso:''})
  });
  persist('prm_eventi',S.eventi); render();
}

function importFromGroup() {
  if(!S.listeEventId || S.gruppi.length===0) return;
  const nomi = S.gruppi.map((g,i)=>`${i+1}. ${g.name} (${(g.members||[]).length} membri)`).join('\n');
  const inp  = prompt('Importa membri come ospiti.\n\nGruppi disponibili:\n'+nomi+'\n\nInserisci il numero del gruppo:');
  const idx  = parseInt(inp)-1;
  if(isNaN(idx)||idx<0||idx>=S.gruppi.length) return;
  const g    = S.gruppi[idx];
  const evtOspiti = (S.eventi.find(e=>e.id===S.listeEventId)?.ospiti)||[];
  const nuovi = (g.members||[])
    .filter(m => !evtOspiti.some(o => o.nome===m.name))
    .map(m => ({id:uid(),nome:m.name,cognome:'',tel:m.phone||'',groupId:g.id,isVip:false,note:'',status:'attesa',ts:Date.now()}));
  if(nuovi.length===0){ toast('Tutti i membri sono già in lista','info'); return; }
  S.eventi = S.eventi.map(e => e.id!==S.listeEventId ? e : {...e,ospiti:[...(e.ospiti||[]),...nuovi]});
  persist('prm_eventi',S.eventi); S.showOspiteForm=false; toast(`${nuovi.length} ospiti importati da "${g.name}"`); render();
}

function exportLista() {
  const ev = S.eventi.find(x=>x.id===S.listeEventId); if(!ev) return;
  const rows = [['Nome','Cognome','Telefono','Gruppo','VIP','Stato','Orario ingresso','Note']];
  (ev.ospiti||[]).forEach(o=>{
    const g = S.gruppi.find(x=>x.id===o.groupId);
    rows.push([o.nome, o.cognome||'', o.tel||'', g?.name||'', o.isVip?'Sì':'No', o.status||'attesa', o.orarioIngresso||'', o.note||'']);
  });
  const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const a   = Object.assign(document.createElement('a'),{href:'data:text/csv;charset=utf-8,'+encodeURIComponent(csv),download:`lista_${isoDate(new Date())}_${esc(ev.name).replace(/[^a-z0-9]/gi,'_')}.csv`});
  a.click(); toast('Lista esportata in CSV','info');
}


function renderPkgDashCard() {
  const pkgs = S.pacchetti.filter(p => p.status === 'disponibile');
  if(pkgs.length === 0) return '';
  const rows = pkgs.slice(0,5).map(p => {
    const ev = S.eventi.find(e => e.id === p.eventId);
    const nP = S.prenotazioniPkg.filter(r => r.pacchettoId === p.id).length;
    return `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)">
      <div><p class="font-medium" style="font-size:13px">${esc(p.nome)}</p><p class="text-dim text-sm">${ev?esc(ev.name):'—'}</p></div>
      <div style="text-align:right"><p class="text-mono text-gold font-medium" style="font-size:13px">${eur(p.prezzoBase)}/p.</p><p class="text-dim text-sm">${nP} pren.</p></div>
    </div>`;
  }).join('');
  return `<div class="card"><p class="card-title">Pacchetti attivi</p>${rows}</div>`;
}

/* ── Boot ─────────────────────────────────────────────────── */
injectManifest();
loadData();
</script>
